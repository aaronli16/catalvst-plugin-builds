name: Build Plugin (VST3 + AU)

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project UUID'
        required: true
        type: string
      plugin_name:
        description: 'Sanitized plugin name (PascalCase, used in CMake)'
        required: true
        type: string
      plugin_code:
        description: '4-char unique plugin code (e.g., Wp3K)'
        required: true
        type: string

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout builds repo
        uses: actions/checkout@v4

      - name: Import Application signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Import Installer signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          create-keychain: false

      - name: Verify project files exist
        run: |
          if [ ! -d "projects/${{ inputs.project_id }}" ]; then
            echo "Error: Project directory projects/${{ inputs.project_id }} not found"
            exit 1
          fi
          echo "Project files:"
          find "projects/${{ inputs.project_id }}" -type f

      - name: Cache Faust compiler
        id: cache-faust
        uses: actions/cache@v4
        with:
          path: ~/faust-install
          key: faust-2.85.5-macos-arm64

      - name: Install Faust compiler
        if: steps.cache-faust.outputs.cache-hit != 'true'
        run: |
          FAUST_VERSION="2.85.5"
          curl -L -o faust.dmg "https://github.com/grame-cncm/faust/releases/download/${FAUST_VERSION}/Faust-${FAUST_VERSION}-arm64.dmg"
          hdiutil attach faust.dmg
          mkdir -p ~/faust-install
          # Find the mounted volume (name may vary)
          FAUST_VOL=$(ls -d /Volumes/Faust* | head -1)
          echo "Mounted volume: $FAUST_VOL"
          # Copy from the .app bundle or directly from volume
          if [ -d "$FAUST_VOL/Faust-${FAUST_VERSION}/bin" ]; then
            cp -R "$FAUST_VOL/Faust-${FAUST_VERSION}/"* ~/faust-install/
          elif [ -d "$FAUST_VOL/Faust-${FAUST_VERSION}.app" ]; then
            cp -R "$FAUST_VOL/Faust-${FAUST_VERSION}.app/Contents/Resources/usr/local/"* ~/faust-install/
          else
            # Fallback: copy everything from volume
            ls -la "$FAUST_VOL/"
            cp -R "$FAUST_VOL/"* ~/faust-install/ || true
          fi
          hdiutil detach "$FAUST_VOL"
          ls -la ~/faust-install/

      - name: Add Faust to PATH
        run: |
          # Find the faust binary wherever it ended up
          FAUST_BIN=$(find ~/faust-install -name "faust" -type f | head -1)
          if [ -z "$FAUST_BIN" ]; then
            echo "Error: faust binary not found in ~/faust-install"
            find ~/faust-install -type f | head -20
            exit 1
          fi
          FAUST_BIN_DIR=$(dirname "$FAUST_BIN")
          echo "$FAUST_BIN_DIR" >> $GITHUB_PATH
          export PATH="$FAUST_BIN_DIR:$PATH"
          faust --version

      - name: Cache JUCE SDK
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ~/juce-sdk
          key: juce-8.0.4-macos

      - name: Download and setup JUCE SDK
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          cd ~
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git juce-sdk

      - name: Copy scaffold and compile Faust
        run: |
          PROJECT_DIR="projects/${{ inputs.project_id }}"

          # Copy scaffold C++ files into project Source/
          cp scaffold/faustMinimal.h "$PROJECT_DIR/Source/"
          cp scaffold/PluginProcessor.h "$PROJECT_DIR/Source/"
          cp scaffold/PluginProcessor.cpp "$PROJECT_DIR/Source/"
          cp scaffold/PluginEditor.h "$PROJECT_DIR/Source/"
          cp scaffold/PluginEditor.cpp "$PROJECT_DIR/Source/"

          # Compile Faust .dsp → self-contained C++ header
          export FAUST_LIB_PATH="$HOME/faust-install/share/faust"
          faust -i --in-place \
            -a "$PROJECT_DIR/Source/faustMinimal.h" \
            "$PROJECT_DIR/Source/effect.dsp" \
            -cn FaustDSP \
            -o "$PROJECT_DIR/Source/FaustDSP.h"

          echo "FaustDSP.h generated ($(wc -l < "$PROJECT_DIR/Source/FaustDSP.h") lines)"

      - name: Copy JUCE JS bridge files into project
        run: |
          PROJECT_DIR="projects/${{ inputs.project_id }}"
          JUCE_JS_SRC="$HOME/juce-sdk/modules/juce_gui_extra/native/javascript"

          mkdir -p "$PROJECT_DIR/Source/ui/js/juce"
          cp "$JUCE_JS_SRC/index.js" "$PROJECT_DIR/Source/ui/js/juce/index.js"
          cp "$JUCE_JS_SRC/check_native_interop.js" "$PROJECT_DIR/Source/ui/js/juce/check_native_interop.js"

          echo "JUCE JS bridge files copied:"
          ls -la "$PROJECT_DIR/Source/ui/js/juce/"

      - name: Generate CMakeLists.txt from scaffold
        run: |
          PROJECT_DIR="projects/${{ inputs.project_id }}"

          # Enumerate ui/* files for BinaryData (relative to project dir)
          UI_FILES=""
          while IFS= read -r file; do
            REL_PATH="${file#$PROJECT_DIR/}"
            if [ -n "$UI_FILES" ]; then
              UI_FILES="${UI_FILES}\n        ${REL_PATH}"
            else
              UI_FILES="${REL_PATH}"
            fi
          done < <(find "$PROJECT_DIR/Source/ui" -type f)

          # Substitute placeholders in CMakeLists.txt template
          sed -e "s|__PLUGIN_NAME__|${{ inputs.plugin_name }}|g" \
              -e "s|__PLUGIN_CODE__|${{ inputs.plugin_code }}|g" \
              scaffold/CMakeLists.txt.in > "$PROJECT_DIR/CMakeLists.txt"

          # Replace __BINARY_DATA_FILES__ placeholder with actual file list
          # Using printf to handle newlines properly
          printf '%s\n' "$(echo -e "$UI_FILES")" > /tmp/ui_files.txt
          python3 -c "
          import sys
          files = open('/tmp/ui_files.txt').read().strip()
          cmake = open('$PROJECT_DIR/CMakeLists.txt').read()
          cmake = cmake.replace('__BINARY_DATA_FILES__', files)
          open('$PROJECT_DIR/CMakeLists.txt', 'w').write(cmake)
          "

          echo "Generated CMakeLists.txt:"
          cat "$PROJECT_DIR/CMakeLists.txt"

      - name: Configure CMake
        run: |
          cmake -B build \
            -S "projects/${{ inputs.project_id }}" \
            -DJUCE_SOURCE_DIR="$HOME/juce-sdk" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            2>&1 | tee build_log.txt

      - name: Build
        run: |
          set -o pipefail
          cmake --build build --config Release -j$(sysctl -n hw.ncpu) \
            2>&1 | tee -a build_log.txt

      - name: Find, sign, and package VST3
        id: package-vst3
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          if [ -z "$VST3_PATH" ]; then
            echo "Error: VST3 bundle not found in build output"
            find build -type d -name "*.vst3" || true
            exit 1
          fi
          echo "Found VST3 at: $VST3_PATH"

          if [ -z "$(ls -A "$VST3_PATH/Contents/MacOS/" 2>/dev/null)" ]; then
            echo "Error: VST3 bundle is empty — no binary in Contents/MacOS/"
            exit 1
          fi

          codesign --force --deep \
            --sign "Developer ID Application: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            --options runtime \
            --timestamp \
            "$VST3_PATH"
          echo "Developer ID signed successfully"

          codesign --verify --verbose=2 "$VST3_PATH"

          mkdir -p "$GITHUB_WORKSPACE/staging-vst3"
          cp -R "$VST3_PATH" "$GITHUB_WORKSPACE/staging-vst3/"

          pkgbuild \
            --root "$GITHUB_WORKSPACE/staging-vst3" \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            --identifier "com.catalvst.${{ inputs.plugin_name }}.vst3" \
            --version "1.0.0" \
            "$GITHUB_WORKSPACE/unsigned-vst3.pkg"

          productsign \
            --sign "Developer ID Installer: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            "$GITHUB_WORKSPACE/unsigned-vst3.pkg" \
            "$GITHUB_WORKSPACE/${{ inputs.plugin_name }}.vst3.pkg"

          rm "$GITHUB_WORKSPACE/unsigned-vst3.pkg"
          echo "VST3 PKG created and signed successfully"

      - name: Find, sign, and package AU
        id: package-au
        run: |
          AU_PATH=$(find build -name "*.component" -type d | head -1)
          if [ -z "$AU_PATH" ]; then
            echo "Error: AU component not found in build output"
            find build -type d -name "*.component" || true
            exit 1
          fi
          echo "Found AU at: $AU_PATH"

          if [ -z "$(ls -A "$AU_PATH/Contents/MacOS/" 2>/dev/null)" ]; then
            echo "Error: AU bundle is empty — no binary in Contents/MacOS/"
            exit 1
          fi

          codesign --force --deep \
            --sign "Developer ID Application: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            --options runtime \
            --timestamp \
            "$AU_PATH"
          echo "Developer ID signed successfully"

          codesign --verify --verbose=2 "$AU_PATH"

          mkdir -p "$GITHUB_WORKSPACE/staging-au"
          cp -R "$AU_PATH" "$GITHUB_WORKSPACE/staging-au/"

          pkgbuild \
            --root "$GITHUB_WORKSPACE/staging-au" \
            --install-location "/Library/Audio/Plug-Ins/Components" \
            --identifier "com.catalvst.${{ inputs.plugin_name }}.au" \
            --version "1.0.0" \
            "$GITHUB_WORKSPACE/unsigned-au.pkg"

          productsign \
            --sign "Developer ID Installer: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            "$GITHUB_WORKSPACE/unsigned-au.pkg" \
            "$GITHUB_WORKSPACE/${{ inputs.plugin_name }}.au.pkg"

          rm "$GITHUB_WORKSPACE/unsigned-au.pkg"
          echo "AU PKG created and signed successfully"

      - name: Notarize and staple VST3 PKG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG_PATH="${{ github.workspace }}/${{ inputs.plugin_name }}.vst3.pkg"

          echo "Submitting VST3 PKG for notarization..."
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            2>&1 | tee notarization_vst3_log.txt

          if ! grep -q "status: Accepted" notarization_vst3_log.txt; then
            echo "VST3 notarization failed."
            SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' notarization_vst3_log.txt | head -1)
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          echo "VST3 notarization accepted. Stapling ticket..."
          xcrun stapler staple "$PKG_PATH"
          echo "VST3 PKG notarized and stapled successfully"

      - name: Notarize and staple AU PKG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG_PATH="${{ github.workspace }}/${{ inputs.plugin_name }}.au.pkg"

          echo "Submitting AU PKG for notarization..."
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            2>&1 | tee notarization_au_log.txt

          if ! grep -q "status: Accepted" notarization_au_log.txt; then
            echo "AU notarization failed."
            SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' notarization_au_log.txt | head -1)
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          echo "AU notarization accepted. Stapling ticket..."
          xcrun stapler staple "$PKG_PATH"
          echo "AU PKG notarized and stapled successfully"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plugin_name }}-vst3"
          path: "${{ inputs.plugin_name }}.vst3.pkg"
          retention-days: 30

      - name: Upload AU artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plugin_name }}-au"
          path: "${{ inputs.plugin_name }}.au.pkg"
          retention-days: 30

      - name: Notify Inngest - build completed
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          BUILD_ERROR=""
          if [ "$CONCLUSION" = "failure" ] && [ -f build_log.txt ]; then
            BUILD_ERROR=$(tail -50 build_log.txt | head -c 2000 | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
            BUILD_ERROR=${BUILD_ERROR:1:-1}
          fi

          if [ -n "$BUILD_ERROR" ]; then
            PAYLOAD="{
              \"name\": \"build/workflow.completed\",
              \"data\": {
                \"project_id\": \"${{ inputs.project_id }}\",
                \"conclusion\": \"$CONCLUSION\",
                \"run_id\": ${{ github.run_id }},
                \"build_error\": \"$BUILD_ERROR\"
              }
            }"
          else
            PAYLOAD="{
              \"name\": \"build/workflow.completed\",
              \"data\": {
                \"project_id\": \"${{ inputs.project_id }}\",
                \"conclusion\": \"$CONCLUSION\",
                \"run_id\": ${{ github.run_id }}
              }
            }"
          fi

          curl -s -X POST "https://inn.gs/e/${{ secrets.INNGEST_EVENT_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Warning: Failed to notify Inngest (non-fatal)"

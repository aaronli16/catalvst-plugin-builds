name: Build VST3 Plugin

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project UUID'
        required: true
        type: string
      plugin_name:
        description: 'Sanitized plugin name (PascalCase, used in CMake)'
        required: true
        type: string

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout builds repo
        uses: actions/checkout@v4

      - name: Import Application signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Import Installer signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          create-keychain: false

      - name: Verify project files exist
        run: |
          if [ ! -d "projects/${{ inputs.project_id }}" ]; then
            echo "Error: Project directory projects/${{ inputs.project_id }} not found"
            exit 1
          fi
          echo "Project files:"
          find "projects/${{ inputs.project_id }}" -type f

      - name: Cache JUCE SDK
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ~/juce-sdk
          key: juce-8.0.4-macos

      - name: Download and setup JUCE SDK
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          cd ~
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git juce-sdk

      - name: Copy JUCE JS bridge files into project
        run: |
          PROJECT_DIR="projects/${{ inputs.project_id }}"
          JUCE_JS_SRC="$HOME/juce-sdk/modules/juce_gui_extra/native/javascript"

          # Create target directory
          mkdir -p "$PROJECT_DIR/Source/ui/js/juce"

          # Copy JUCE WebView bridge files
          cp "$JUCE_JS_SRC/index.js" "$PROJECT_DIR/Source/ui/js/juce/index.js"
          cp "$JUCE_JS_SRC/check_native_interop.js" "$PROJECT_DIR/Source/ui/js/juce/check_native_interop.js"

          echo "JUCE JS bridge files copied:"
          ls -la "$PROJECT_DIR/Source/ui/js/juce/"

      - name: Configure CMake
        run: |
          cmake -B build \
            -S "projects/${{ inputs.project_id }}" \
            -DJUCE_SOURCE_DIR="$HOME/juce-sdk" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            2>&1 | tee build_log.txt

      - name: Build
        run: |
          cmake --build build --config Release -j$(sysctl -n hw.ncpu) \
            2>&1 | tee -a build_log.txt

      - name: Find, sign, and package VST3
        id: package
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          if [ -z "$VST3_PATH" ]; then
            echo "Error: VST3 bundle not found in build output"
            find build -type d -name "*.vst3" || true
            exit 1
          fi
          echo "Found VST3 at: $VST3_PATH"
          echo "vst3_path=$VST3_PATH" >> "$GITHUB_OUTPUT"

          # Safety net: verify the binary actually exists inside the bundle
          if [ -z "$(ls -A "$VST3_PATH/Contents/MacOS/" 2>/dev/null)" ]; then
            echo "Error: VST3 bundle is empty — no binary in Contents/MacOS/"
            exit 1
          fi

          # Sign with Developer ID certificate (required for notarization)
          codesign --force --deep \
            --sign "Developer ID Application: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            --options runtime \
            --timestamp \
            "$VST3_PATH"
          echo "Developer ID signed successfully"

          # Verify the signature
          codesign --verify --verbose=2 "$VST3_PATH"

          # Create PKG installer (auto-installs VST3 to system plugin folder)
          mkdir -p "$GITHUB_WORKSPACE/staging"
          cp -R "$VST3_PATH" "$GITHUB_WORKSPACE/staging/"

          # Build unsigned pkg
          pkgbuild \
            --root "$GITHUB_WORKSPACE/staging" \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            --identifier "com.catalvst.${{ inputs.plugin_name }}" \
            --version "1.0.0" \
            "$GITHUB_WORKSPACE/unsigned.pkg"

          # Sign the pkg with Developer ID Installer certificate
          productsign \
            --sign "Developer ID Installer: Aaron Li (${{ secrets.APPLE_TEAM_ID }})" \
            "$GITHUB_WORKSPACE/unsigned.pkg" \
            "$GITHUB_WORKSPACE/${{ inputs.plugin_name }}.vst3.pkg"

          rm "$GITHUB_WORKSPACE/unsigned.pkg"
          echo "PKG created and signed successfully"

      - name: Notarize and staple PKG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG_PATH="${{ github.workspace }}/${{ inputs.plugin_name }}.vst3.pkg"

          echo "Submitting PKG for notarization..."
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            2>&1 | tee notarization_log.txt

          # Check if notarization succeeded
          if ! grep -q "status: Accepted" notarization_log.txt; then
            echo "Notarization failed. Fetching detailed log..."
            # Extract the submission ID from the output
            SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' notarization_log.txt | head -1)
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

          echo "Notarization accepted. Stapling ticket..."
          xcrun stapler staple "$PKG_PATH"
          echo "PKG notarized and stapled successfully"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.plugin_name }}-vst3"
          path: "${{ inputs.plugin_name }}.vst3.pkg"
          retention-days: 30

      - name: Notify Inngest - build completed
        if: always()
        run: |
          STATUS="${{ job.status }}"
          # Map GitHub job status to our conclusion format
          if [ "$STATUS" = "success" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          # On failure, capture last 50 lines of build log for AI debugging
          BUILD_ERROR=""
          if [ "$CONCLUSION" = "failure" ] && [ -f build_log.txt ]; then
            # Get last 50 lines, cap at 2000 chars, escape for JSON
            BUILD_ERROR=$(tail -50 build_log.txt | head -c 2000 | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
            # python3 outputs a quoted JSON string like "foo\nbar" — strip outer quotes
            BUILD_ERROR=${BUILD_ERROR:1:-1}
          fi

          # Build JSON payload — include build_error only on failure
          if [ -n "$BUILD_ERROR" ]; then
            PAYLOAD="{
              \"name\": \"build/workflow.completed\",
              \"data\": {
                \"project_id\": \"${{ inputs.project_id }}\",
                \"conclusion\": \"$CONCLUSION\",
                \"run_id\": ${{ github.run_id }},
                \"build_error\": \"$BUILD_ERROR\"
              }
            }"
          else
            PAYLOAD="{
              \"name\": \"build/workflow.completed\",
              \"data\": {
                \"project_id\": \"${{ inputs.project_id }}\",
                \"conclusion\": \"$CONCLUSION\",
                \"run_id\": ${{ github.run_id }}
              }
            }"
          fi

          curl -s -X POST "https://inn.gs/e/${{ secrets.INNGEST_EVENT_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Warning: Failed to notify Inngest (non-fatal)"

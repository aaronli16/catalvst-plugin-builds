<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tape Flanger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  :root {
    --cream: #F5EDE0;
    --cream-light: #FAF6EF;
    --cream-dark: #E8DCCB;
    --orange: #D4763C;
    --orange-light: #E89B5E;
    --orange-dark: #B85E2A;
    --brown: #5C3D2E;
    --brown-light: #7A5544;
    --brown-dark: #3D271E;
    --text-dark: #3A2A1E;
    --text-mid: #7A6555;
    --shadow-soft: rgba(92, 61, 46, 0.12);
    --shadow-med: rgba(92, 61, 46, 0.22);
  }

  body {
    background: var(--cream);
    font-family: 'Space Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .plugin-container {
    width: 520px;
    background: linear-gradient(180deg, var(--cream-light) 0%, var(--cream) 40%, var(--cream-dark) 100%);
    border-radius: 22px;
    border: 2px solid var(--cream-dark);
    box-shadow:
      0 8px 32px var(--shadow-med),
      0 2px 8px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.6);
    padding: 32px 36px 28px;
    position: relative;
    overflow: hidden;
  }

  .plugin-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(92,61,46,0.015) 2px,
      rgba(92,61,46,0.015) 4px
    );
    pointer-events: none;
    border-radius: 22px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--cream-dark);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
  }

  .plugin-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--brown);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
  }

  .plugin-subtitle {
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .status-led {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 8px rgba(212, 118, 60, 0.5);
    transition: all 0.3s ease;
  }

  .status-led.active {
    background: var(--orange-light);
    box-shadow: 0 0 14px rgba(232, 155, 94, 0.7);
  }

  .knobs-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .knob-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .knob-wrapper {
    position: relative;
    width: 88px;
    height: 88px;
    cursor: grab;
  }

  .knob-wrapper:active {
    cursor: grabbing;
  }

  .knob-track {
    fill: none;
    stroke: var(--cream-dark);
    stroke-width: 4;
    stroke-linecap: round;
  }

  .knob-arc {
    fill: none;
    stroke: var(--orange);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke 0.15s ease;
    filter: drop-shadow(0 0 3px rgba(212, 118, 60, 0.3));
  }

  .knob-body {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FBF4EA, #E6D9C7);
    box-shadow:
      0 3px 10px var(--shadow-med),
      0 1px 3px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .knob-indicator {
    width: 3px;
    height: 14px;
    background: var(--orange);
    border-radius: 2px;
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    transform-origin: center 21px;
    box-shadow: 0 0 4px rgba(212, 118, 60, 0.3);
  }

  .knob-value {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dark);
    margin-top: 12px;
    letter-spacing: 0.5px;
    min-height: 16px;
    text-align: center;
  }

  .knob-group.manual .knob-wrapper {
    width: 96px;
    height: 96px;
  }

  .knob-group.manual .knob-body {
    width: 62px;
    height: 62px;
  }

  .knob-group.manual .knob-indicator {
    height: 16px;
    top: 6px;
    transform-origin: center 25px;
  }

  .sweep-bar {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--cream-dark);
  }

  .sweep-label {
    font-size: 8px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .sweep-track {
    width: 100%;
    height: 4px;
    background: var(--cream-dark);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .sweep-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 24px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    border-radius: 2px;
    animation: sweep 3s ease-in-out infinite;
  }

  @keyframes sweep {
    0%, 100% { left: -24px; }
    50% { left: calc(100% - 0px); }
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
  }

  .footer-text {
    font-size: 8px;
    color: var(--text-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .knob-wrapper:hover .knob-body {
    box-shadow:
      0 3px 12px var(--shadow-med),
      0 1px 4px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .knob-wrapper:hover .knob-arc {
    stroke: var(--orange-light);
  }

  .knob-body.resetting {
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
</head>
<body>

<div class="plugin-container">

  <div class="header">
    <div class="logo-area">
      <div class="plugin-title">Tape Flanger</div>
      <div class="plugin-subtitle">Analog Character</div>
    </div>
    <div class="status-led active" id="statusLed"></div>
  </div>

  <div class="knobs-row">

    <div class="knob-group">
      <div class="knob-label">Rate</div>
      <div class="knob-wrapper" data-param="RATE" data-min="0.05" data-max="5.0" data-default="0.4" data-unit=" Hz" data-decimals="2">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="RATE-track" />
          <path class="knob-arc" id="RATE-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="RATE-value">0.40 Hz</div>
    </div>

    <div class="knob-group">
      <div class="knob-label">Depth</div>
      <div class="knob-wrapper" data-param="DEPTH" data-min="0" data-max="100" data-default="50" data-unit="%" data-decimals="0">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="DEPTH-track" />
          <path class="knob-arc" id="DEPTH-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="DEPTH-value">50%</div>
    </div>

    <div class="knob-group manual">
      <div class="knob-label">Manual</div>
      <div class="knob-wrapper" data-param="MANUAL" data-min="0.1" data-max="10.0" data-default="5.0" data-unit=" ms" data-decimals="1">
        <svg viewBox="0 0 96 96" class="knob-svg">
          <path class="knob-track" id="MANUAL-track" />
          <path class="knob-arc" id="MANUAL-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="MANUAL-value">5.0 ms</div>
    </div>

    <div class="knob-group">
      <div class="knob-label">Feedback</div>
      <div class="knob-wrapper" data-param="FEEDBACK" data-min="0" data-max="95" data-default="35" data-unit="%" data-decimals="0">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="FEEDBACK-track" />
          <path class="knob-arc" id="FEEDBACK-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="FEEDBACK-value">35%</div>
    </div>

  </div>

  <div class="sweep-bar">
    <div class="sweep-label">Modulation Sweep</div>
    <div class="sweep-track">
      <div class="sweep-fill" id="sweepFill"></div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Tape Flanger v1.0</span>
    <span class="footer-text">Double-click to reset</span>
  </div>

</div>

<script type="module" src="js/juce/index.js"></script>
<script type="module">
import { getSliderState } from './js/juce/index.js';

// === Constants ===
const ARC_START_ANGLE = 135;
const ARC_END_ANGLE = 405;
const ARC_RANGE = ARC_END_ANGLE - ARC_START_ANGLE;

// === Utility ===
function degToRad(deg) {
  return (deg * Math.PI) / 180;
}

function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = degToRad(angleDeg - 90);
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad)
  };
}

function describeArc(cx, cy, r, startAngle, endAngle) {
  if (Math.abs(endAngle - startAngle) < 0.1) return '';
  const start = polarToCartesian(cx, cy, r, startAngle);
  const end = polarToCartesian(cx, cy, r, endAngle);
  const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
  return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
}

// === Parameter Relay States ===
const paramConfigs = {
  RATE:     { min: 0.05, max: 5.0,  unit: ' Hz', decimals: 2 },
  DEPTH:    { min: 0,    max: 100,  unit: '%',    decimals: 0 },
  MANUAL:   { min: 0.1,  max: 10.0, unit: ' ms',  decimals: 1 },
  FEEDBACK: { min: 0,    max: 95,   unit: '%',    decimals: 0 }
};

const sliderStates = {};

// === Visual Update ===
function updateKnobVisual(paramId, normalizedValue) {
  const wrapper = document.querySelector(`[data-param="${paramId}"]`);
  if (!wrapper) return;

  const cfg = paramConfigs[paramId];
  const isManual = wrapper.closest('.knob-group').classList.contains('manual');
  const size = isManual ? 96 : 88;
  const cx = size / 2;
  const cy = size / 2;
  const r = (size / 2) - 6;

  // Track arc
  const trackPath = document.getElementById(paramId + '-track');
  trackPath.setAttribute('d', describeArc(cx, cy, r, ARC_START_ANGLE, ARC_END_ANGLE));

  // Value arc
  const arcPath = document.getElementById(paramId + '-arc');
  const endAngle = ARC_START_ANGLE + normalizedValue * ARC_RANGE;
  arcPath.setAttribute('d', describeArc(cx, cy, r, ARC_START_ANGLE, endAngle));

  // Indicator rotation
  const indicator = wrapper.querySelector('.knob-indicator');
  const rotationDeg = ARC_START_ANGLE + normalizedValue * ARC_RANGE;
  indicator.style.transform = `translateX(-50%) rotate(${rotationDeg}deg)`;

  // Value display
  const realValue = cfg.min + normalizedValue * (cfg.max - cfg.min);
  const display = document.getElementById(paramId + '-value');
  display.textContent = realValue.toFixed(cfg.decimals) + cfg.unit;

  // Update sweep speed when rate changes
  if (paramId === 'RATE') {
    const fill = document.getElementById('sweepFill');
    fill.style.animationDuration = (1 / Math.max(0.05, realValue)) + 's';
  }
}

// === Wire up JUCE Slider States ===
for (const paramId of Object.keys(paramConfigs)) {
  try {
    const state = getSliderState(paramId);
    sliderStates[paramId] = state;

    // Listen for value changes from the DAW / automation
    state.valueChangedEvent.addListener(() => {
      const norm = state.getNormalisedValue();
      updateKnobVisual(paramId, norm);
    });

    // Initial sync
    updateKnobVisual(paramId, state.getNormalisedValue());
  } catch (e) {
    console.warn('Could not get slider state for', paramId, e);
    // Still draw initial visuals from defaults
    const wrapper = document.querySelector(`[data-param="${paramId}"]`);
    if (wrapper) {
      const cfg = paramConfigs[paramId];
      const def = parseFloat(wrapper.dataset.default);
      const norm = (def - cfg.min) / (cfg.max - cfg.min);
      updateKnobVisual(paramId, norm);
    }
  }
}

// === Mouse Interaction (relative drag) ===
let activeKnob = null;
let lastY = 0;
let currentNorm = 0;

function onPointerDown(e) {
  const wrapper = e.target.closest('.knob-wrapper');
  if (!wrapper) return;

  const paramId = wrapper.dataset.param;
  const state = sliderStates[paramId];
  if (!state) return;

  activeKnob = { wrapper, paramId, state };
  lastY = e.clientY;
  currentNorm = state.getNormalisedValue();

  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
  e.preventDefault();
}

function onPointerMove(e) {
  if (!activeKnob) return;

  const deltaY = lastY - e.clientY;
  lastY = e.clientY;

  const sensitivity = e.shiftKey ? 0.001 : 0.005;
  currentNorm = Math.min(1.0, Math.max(0.0, currentNorm + deltaY * sensitivity));

  activeKnob.state.setNormalisedValue(currentNorm);
}

function onPointerUp() {
  if (activeKnob) {
    activeKnob.state.endGesture();
  }
  activeKnob = null;
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup', onPointerUp);
}

// Double-click to reset
function onDoubleClick(e) {
  const wrapper = e.target.closest('.knob-wrapper');
  if (!wrapper) return;

  const paramId = wrapper.dataset.param;
  const state = sliderStates[paramId];
  if (!state) return;

  const cfg = paramConfigs[paramId];
  const defaultVal = parseFloat(wrapper.dataset.default);
  const defaultNorm = (defaultVal - cfg.min) / (cfg.max - cfg.min);

  state.setNormalisedValue(defaultNorm);

  const body = wrapper.querySelector('.knob-body');
  body.classList.add('resetting');
  setTimeout(() => body.classList.remove('resetting'), 300);
}

// Bind events
const knobs = document.querySelectorAll('.knob-wrapper');
knobs.forEach(knob => {
  knob.addEventListener('pointerdown', onPointerDown);
  knob.addEventListener('dblclick', onDoubleClick);
});

// LED pulse
const led = document.getElementById('statusLed');
function pulseLed() {
  const rateState = sliderStates['RATE'];
  const cfg = paramConfigs['RATE'];
  let rateHz = cfg.min;
  if (rateState) {
    const norm = rateState.getNormalisedValue();
    rateHz = cfg.min + norm * (cfg.max - cfg.min);
  }
  const interval = (1 / Math.max(0.05, rateHz)) * 1000;

  led.classList.remove('active');
  setTimeout(() => led.classList.add('active'), 80);
  setTimeout(pulseLed, interval);
}
pulseLed();
</script>

</body>
</html>

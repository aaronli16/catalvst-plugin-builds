<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tape Flanger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  :root {
    --cream: #F5EDE0;
    --cream-light: #FAF6EF;
    --cream-dark: #E8DCCB;
    --orange: #D4763C;
    --orange-light: #E89B5E;
    --orange-dark: #B85E2A;
    --brown: #5C3D2E;
    --brown-light: #7A5544;
    --brown-dark: #3D271E;
    --text-dark: #3A2A1E;
    --text-mid: #7A6555;
    --shadow-soft: rgba(92, 61, 46, 0.12);
    --shadow-med: rgba(92, 61, 46, 0.22);
  }

  body {
    background: var(--cream);
    font-family: 'Space Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .plugin-container {
    width: 520px;
    background: linear-gradient(180deg, var(--cream-light) 0%, var(--cream) 40%, var(--cream-dark) 100%);
    border-radius: 22px;
    border: 2px solid var(--cream-dark);
    box-shadow:
      0 8px 32px var(--shadow-med),
      0 2px 8px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.6);
    padding: 32px 36px 28px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle texture overlay */
  .plugin-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(92,61,46,0.015) 2px,
      rgba(92,61,46,0.015) 4px
    );
    pointer-events: none;
    border-radius: 22px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--cream-dark);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
  }

  .plugin-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--brown);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
  }

  .plugin-subtitle {
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Status indicator */
  .status-led {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 8px rgba(212, 118, 60, 0.5);
    transition: all 0.3s ease;
  }

  .status-led.active {
    background: var(--orange-light);
    box-shadow: 0 0 14px rgba(232, 155, 94, 0.7);
  }

  /* Knob section */
  .knobs-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .knob-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .knob-wrapper {
    position: relative;
    width: 88px;
    height: 88px;
    cursor: grab;
  }

  .knob-wrapper:active {
    cursor: grabbing;
  }

  /* Knob SVG styling */
  .knob-track {
    fill: none;
    stroke: var(--cream-dark);
    stroke-width: 4;
    stroke-linecap: round;
  }

  .knob-arc {
    fill: none;
    stroke: var(--orange);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke 0.15s ease;
    filter: drop-shadow(0 0 3px rgba(212, 118, 60, 0.3));
  }

  .knob-body {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FBF4EA, #E6D9C7);
    box-shadow:
      0 3px 10px var(--shadow-med),
      0 1px 3px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .knob-indicator {
    width: 3px;
    height: 14px;
    background: var(--orange);
    border-radius: 2px;
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    transform-origin: center 21px;
    box-shadow: 0 0 4px rgba(212, 118, 60, 0.3);
  }

  .knob-value {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dark);
    margin-top: 12px;
    letter-spacing: 0.5px;
    min-height: 16px;
    text-align: center;
  }

  /* Tick marks around knobs */
  .knob-ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .tick {
    position: absolute;
    width: 1px;
    height: 4px;
    background: var(--cream-dark);
    top: 2px;
    left: 50%;
    transform-origin: 50% 42px;
  }

  /* Manual knob is slightly larger */
  .knob-group.manual .knob-wrapper {
    width: 96px;
    height: 96px;
  }

  .knob-group.manual .knob-body {
    width: 62px;
    height: 62px;
  }

  .knob-group.manual .knob-indicator {
    height: 16px;
    top: 6px;
    transform-origin: center 25px;
  }

  /* Sweep animation indicator */
  .sweep-bar {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--cream-dark);
  }

  .sweep-label {
    font-size: 8px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .sweep-track {
    width: 100%;
    height: 4px;
    background: var(--cream-dark);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .sweep-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 24px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    border-radius: 2px;
    animation: sweep 3s ease-in-out infinite;
  }

  @keyframes sweep {
    0%, 100% { left: -24px; }
    50% { left: calc(100% - 0px); }
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
  }

  .footer-text {
    font-size: 8px;
    color: var(--text-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Hover effects */
  .knob-wrapper:hover .knob-body {
    box-shadow:
      0 3px 12px var(--shadow-med),
      0 1px 4px var(--shadow-soft),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .knob-wrapper:hover .knob-arc {
    stroke: var(--orange-light);
  }

  /* Double-click reset animation */
  .knob-body.resetting {
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
</head>
<body>

<div class="plugin-container">

  <!-- Header -->
  <div class="header">
    <div class="logo-area">
      <div class="plugin-title">Tape Flanger</div>
      <div class="plugin-subtitle">Analog Character</div>
    </div>
    <div class="status-led active" id="statusLed"></div>
  </div>

  <!-- Knobs -->
  <div class="knobs-row">

    <!-- Rate -->
    <div class="knob-group">
      <div class="knob-label">Rate</div>
      <div class="knob-wrapper" data-param="rate" data-min="0.05" data-max="5.0" data-default="0.4" data-value="0.4" data-unit=" Hz">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="rate-track" />
          <path class="knob-arc" id="rate-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="rate-value">0.40 Hz</div>
    </div>

    <!-- Depth -->
    <div class="knob-group">
      <div class="knob-label">Depth</div>
      <div class="knob-wrapper" data-param="depth" data-min="0" data-max="100" data-default="50" data-value="50" data-unit="%">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="depth-track" />
          <path class="knob-arc" id="depth-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="depth-value">50%</div>
    </div>

    <!-- Manual -->
    <div class="knob-group manual">
      <div class="knob-label">Manual</div>
      <div class="knob-wrapper" data-param="manual" data-min="0.1" data-max="10.0" data-default="5.0" data-value="5.0" data-unit=" ms">
        <svg viewBox="0 0 96 96" class="knob-svg">
          <path class="knob-track" id="manual-track" />
          <path class="knob-arc" id="manual-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="manual-value">5.0 ms</div>
    </div>

    <!-- Feedback -->
    <div class="knob-group">
      <div class="knob-label">Feedback</div>
      <div class="knob-wrapper" data-param="feedback" data-min="0" data-max="95" data-default="35" data-value="35" data-unit="%">
        <svg viewBox="0 0 88 88" class="knob-svg">
          <path class="knob-track" id="feedback-track" />
          <path class="knob-arc" id="feedback-arc" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
        </div>
      </div>
      <div class="knob-value" id="feedback-value">35%</div>
    </div>

  </div>

  <!-- Sweep Indicator -->
  <div class="sweep-bar">
    <div class="sweep-label">Modulation Sweep</div>
    <div class="sweep-track">
      <div class="sweep-fill" id="sweepFill"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">Tape Flanger v1.0</span>
    <span class="footer-text">Double-click to reset</span>
  </div>

</div>

<script>
(function() {
  // === Constants ===
  const ARC_START_ANGLE = 135;
  const ARC_END_ANGLE = 405;
  const ARC_RANGE = ARC_END_ANGLE - ARC_START_ANGLE;

  // === Utility ===
  function degToRad(deg) {
    return (deg * Math.PI) / 180;
  }

  function polarToCartesian(cx, cy, r, angleDeg) {
    const rad = degToRad(angleDeg - 90);
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function describeArc(cx, cy, r, startAngle, endAngle) {
    if (Math.abs(endAngle - startAngle) < 0.1) return '';
    const start = polarToCartesian(cx, cy, r, startAngle);
    const end = polarToCartesian(cx, cy, r, endAngle);
    const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
    return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
  }

  // === Draw knob arcs ===
  function updateKnob(wrapper) {
    const param = wrapper.dataset.param;
    const min = parseFloat(wrapper.dataset.min);
    const max = parseFloat(wrapper.dataset.max);
    const value = parseFloat(wrapper.dataset.value);
    const unit = wrapper.dataset.unit || '';

    const normalized = (value - min) / (max - min);
    const isManual = wrapper.closest('.knob-group').classList.contains('manual');
    const size = isManual ? 96 : 88;
    const cx = size / 2;
    const cy = size / 2;
    const r = (size / 2) - 6;

    // Track arc
    const trackPath = document.getElementById(param + '-track');
    trackPath.setAttribute('d', describeArc(cx, cy, r, ARC_START_ANGLE, ARC_END_ANGLE));

    // Value arc
    const arcPath = document.getElementById(param + '-arc');
    const endAngle = ARC_START_ANGLE + normalized * ARC_RANGE;
    arcPath.setAttribute('d', describeArc(cx, cy, r, ARC_START_ANGLE, endAngle));

    // Indicator rotation
    const indicator = wrapper.querySelector('.knob-indicator');
    const rotationDeg = ARC_START_ANGLE + normalized * ARC_RANGE;
    indicator.style.transform = `translateX(-50%) rotate(${rotationDeg}deg)`;

    // Value display
    const display = document.getElementById(param + '-value');
    if (param === 'rate') {
      display.textContent = value.toFixed(2) + unit;
    } else if (param === 'manual') {
      display.textContent = value.toFixed(1) + unit;
    } else {
      display.textContent = Math.round(value) + unit;
    }

    // Update sweep animation speed based on rate
    if (param === 'rate') {
      updateSweepSpeed(value);
    }

    // Send to DAW
    sendParam(param, normalized);
  }

  function updateSweepSpeed(rateHz) {
    const duration = 1 / rateHz;
    const fill = document.getElementById('sweepFill');
    fill.style.animationDuration = duration + 's';
  }

  function sendParam(name, normalizedValue) {
    try {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.pluginMessage) {
        window.webkit.messageHandlers.pluginMessage.postMessage({
          type: 'parameterChange',
          name: name,
          value: normalizedValue
        });
      }
    } catch(e) {}
  }

  // === Mouse interaction ===
  let activeKnob = null;
  let startY = 0;
  let startValue = 0;

  function onPointerDown(e) {
    const wrapper = e.target.closest('.knob-wrapper');
    if (!wrapper) return;

    activeKnob = wrapper;
    startY = e.clientY;
    startValue = parseFloat(wrapper.dataset.value);

    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!activeKnob) return;

    const min = parseFloat(activeKnob.dataset.min);
    const max = parseFloat(activeKnob.dataset.max);
    const range = max - min;

    const dy = startY - e.clientY;
    const sensitivity = e.shiftKey ? 600 : 200;
    const delta = (dy / sensitivity) * range;

    let newValue = Math.min(max, Math.max(min, startValue + delta));
    activeKnob.dataset.value = newValue;
    updateKnob(activeKnob);
  }

  function onPointerUp() {
    activeKnob = null;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
  }

  // Double-click to reset
  function onDoubleClick(e) {
    const wrapper = e.target.closest('.knob-wrapper');
    if (!wrapper) return;

    const defaultVal = parseFloat(wrapper.dataset.default);
    wrapper.dataset.value = defaultVal;

    const body = wrapper.querySelector('.knob-body');
    body.classList.add('resetting');
    setTimeout(() => body.classList.remove('resetting'), 300);

    updateKnob(wrapper);
  }

  // === Initialize ===
  const knobs = document.querySelectorAll('.knob-wrapper');
  knobs.forEach(knob => {
    knob.addEventListener('pointerdown', onPointerDown);
    knob.addEventListener('dblclick', onDoubleClick);
    updateKnob(knob);
  });

  // LED pulse
  const led = document.getElementById('statusLed');
  function pulseLed() {
    const rateKnob = document.querySelector('[data-param="rate"]');
    const rateHz = parseFloat(rateKnob.dataset.value);
    const interval = (1 / rateHz) * 1000;

    led.classList.remove('active');
    setTimeout(() => led.classList.add('active'), 80);
    setTimeout(pulseLed, interval);
  }
  pulseLed();

  // Receive updates from DAW
  window.updateFromDSP = function(name, normalizedValue) {
    const wrapper = document.querySelector(`[data-param="${name}"]`);
    if (!wrapper) return;
    const min = parseFloat(wrapper.dataset.min);
    const max = parseFloat(wrapper.dataset.max);
    wrapper.dataset.value = min + normalizedValue * (max - min);
    updateKnob(wrapper);
  };

})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --cream: #F5EDE0;
    --cream-light: #FAF6EF;
    --brown-dark: #3D2B1F;
    --brown-mid: #6B4C3B;
    --brown-light: #8C6E5D;
    --brown-accent: #A0826D;
    --amber: #D4A04A;
    --amber-glow: #E8B85C;
    --shadow-dark: rgba(40, 25, 15, 0.35);
    --shadow-light: rgba(255, 248, 235, 0.5);
    --knob-size: 80px;
    --knob-size-large: 120px;
  }

  html, body {
    width: 500px;
    height: 380px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    background: #2A1C12;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  .plugin-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    background: linear-gradient(170deg, #F5EDE0 0%, #E8DACA 60%, #DDD0BF 100%);
    border-radius: 12px;
    border: 2px solid var(--brown-mid);
    box-shadow:
      inset 0 1px 0 var(--shadow-light),
      0 4px 16px var(--shadow-dark),
      0 1px 3px rgba(40, 25, 15, 0.2);
    font-family: 'Space Mono', monospace;
    position: relative;
  }

  /* Subtle texture overlay */
  .plugin-root::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(61, 43, 31, 0.015) 2px,
      rgba(61, 43, 31, 0.015) 4px
    );
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(107, 76, 59, 0.25);
  }

  .brand-name {
    font-family: 'Courier Prime', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--brown-dark);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 1px 0 var(--shadow-light);
  }

  .brand-sub {
    font-size: 9px;
    color: var(--brown-light);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Indicator LED */
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 6px rgba(212, 160, 74, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.3);
  }

  /* Controls area */
  .controls {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 36px;
    flex: 1;
    padding-top: 8px;
  }

  /* Knob container */
  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .knob-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--brown-mid);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    order: 1;
  }

  .knob-value {
    font-size: 10px;
    color: var(--brown-light);
    font-weight: 400;
    letter-spacing: 1px;
    height: 14px;
    order: 2;
  }

  /* Knob styling */
  .knob-wrapper {
    position: relative;
    order: 0;
  }

  .knob {
    width: var(--knob-size);
    height: var(--knob-size);
    border-radius: 50%;
    background: linear-gradient(145deg, #E8DACA, #C8B8A4);
    border: 2px solid var(--brown-accent);
    box-shadow:
      0 3px 8px var(--shadow-dark),
      inset 0 2px 4px var(--shadow-light),
      inset 0 -1px 3px rgba(107, 76, 59, 0.15);
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow 0.15s ease;
    user-select: none;
  }

  .knob:hover {
    box-shadow:
      0 3px 10px var(--shadow-dark),
      0 0 0 2px rgba(212, 160, 74, 0.2),
      inset 0 2px 4px var(--shadow-light),
      inset 0 -1px 3px rgba(107, 76, 59, 0.15);
  }

  .knob:active {
    cursor: grabbing;
  }

  .knob.large {
    width: var(--knob-size-large);
    height: var(--knob-size-large);
    border-width: 3px;
  }

  /* Knob indicator line */
  .knob-indicator {
    width: 2px;
    height: 28%;
    background: var(--brown-dark);
    border-radius: 1px;
    position: absolute;
    top: 14%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .knob.large .knob-indicator {
    height: 30%;
    top: 12%;
    width: 3px;
    border-radius: 1.5px;
    background: var(--amber);
  }

  /* Arc track around knob */
  .knob-arc {
    position: absolute;
    inset: -6px;
    pointer-events: none;
  }

  .knob.large + .knob-arc,
  .knob-wrapper:has(.knob.large) .knob-arc {
    inset: -8px;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding-top: 8px;
    border-top: 1px solid rgba(107, 76, 59, 0.2);
  }

  .footer-text {
    font-size: 8px;
    color: var(--brown-accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Screw details */
  .screws {
    position: absolute;
    inset: 10px;
    pointer-events: none;
  }

  .screw {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C8B8A4, #A89888);
    border: 1px solid rgba(107, 76, 59, 0.3);
    box-shadow: inset 0 1px 2px rgba(255, 248, 235, 0.4), 0 1px 2px rgba(40, 25, 15, 0.15);
  }

  .screw::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 1px;
    background: rgba(107, 76, 59, 0.4);
    transform: translate(-50%, -50%) rotate(35deg);
  }

  .screw.tl { top: 0; left: 0; }
  .screw.tr { top: 0; right: 0; }
  .screw.bl { bottom: 0; left: 0; }
  .screw.br { bottom: 0; right: 0; }
</style>
</head>
<body>

<div class="plugin-root">
  <!-- Corner screws -->
  <div class="screws">
    <div class="screw tl"></div>
    <div class="screw tr"></div>
    <div class="screw bl"></div>
    <div class="screw br"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand-name">Crunch</div>
      <div class="brand-sub">Bitcrusher</div>
    </div>
    <div class="led"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Bits knob -->
    <div class="knob-group">
      <div class="knob-wrapper">
        <div class="knob" data-param="bits" data-min="1" data-max="16" data-value="16" data-unit=" bit" data-decimals="1">
          <div class="knob-indicator"></div>
        </div>
        <svg class="knob-arc" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(107,76,59,0.15)" stroke-width="2"
            stroke-dasharray="217" stroke-dashoffset="72"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
          <circle class="arc-fill" cx="50" cy="50" r="46" fill="none" stroke="rgba(212,160,74,0.5)" stroke-width="2"
            stroke-dasharray="217" stroke-dashoffset="217"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="knob-label">Bits</span>
      <span class="knob-value">16.0 bit</span>
    </div>

    <!-- CRUSH — main knob -->
    <div class="knob-group">
      <div class="knob-wrapper">
        <div class="knob large" data-param="crush" data-min="0" data-max="100" data-value="0" data-unit="%" data-decimals="0">
          <div class="knob-indicator"></div>
        </div>
        <svg class="knob-arc" viewBox="0 0 100 100" style="inset: -8px;">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(107,76,59,0.15)" stroke-width="2.5"
            stroke-dasharray="217" stroke-dashoffset="72"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
          <circle class="arc-fill" cx="50" cy="50" r="46" fill="none" stroke="rgba(212,160,74,0.7)" stroke-width="2.5"
            stroke-dasharray="217" stroke-dashoffset="217"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="knob-label">Crush</span>
      <span class="knob-value">0%</span>
    </div>

    <!-- Mix knob -->
    <div class="knob-group">
      <div class="knob-wrapper">
        <div class="knob" data-param="mix" data-min="0" data-max="100" data-value="50" data-unit="%" data-decimals="0">
          <div class="knob-indicator"></div>
        </div>
        <svg class="knob-arc" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(107,76,59,0.15)" stroke-width="2"
            stroke-dasharray="217" stroke-dashoffset="72"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
          <circle class="arc-fill" cx="50" cy="50" r="46" fill="none" stroke="rgba(212,160,74,0.5)" stroke-width="2"
            stroke-dasharray="217" stroke-dashoffset="217"
            transform="rotate(135 50 50)" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="knob-label">Mix</span>
      <span class="knob-value">50%</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">Digital Bitcrusher</span>
  </div>
</div>

<script type="module">
  import { getSliderState } from './js/juce/index.js';

  const ARC_TOTAL = 217;

  const paramMap = {
    bits:  { id: 'BITS',  min: 1,  max: 16,  defaultVal: 16, unit: ' bit', decimals: 1 },
    crush: { id: 'CRUSH', min: 0,  max: 100, defaultVal: 0,  unit: '%',    decimals: 0 },
    mix:   { id: 'MIX',   min: 0,  max: 100, defaultVal: 50, unit: '%',    decimals: 0 }
  };

  document.querySelectorAll('.knob').forEach(knob => {
    const wrapper = knob.closest('.knob-wrapper');
    const group = knob.closest('.knob-group');
    const arcFill = wrapper.querySelector('.arc-fill');
    const valueDisplay = group.querySelector('.knob-value');
    const paramKey = knob.dataset.param;
    const cfg = paramMap[paramKey];
    if (!cfg) return;

    const sliderState = getSliderState(cfg.id);

    function updateVisuals(norm) {
      const displayValue = cfg.min + norm * (cfg.max - cfg.min);
      const angle = -135 + norm * 270;
      knob.querySelector('.knob-indicator').style.transform =
        `translateX(-50%) rotate(${angle}deg)`;
      const arcVisible = ARC_TOTAL * norm;
      arcFill.setAttribute('stroke-dashoffset', ARC_TOTAL - arcVisible);
      valueDisplay.textContent = displayValue.toFixed(cfg.decimals) + cfg.unit;
    }

    // Listen for changes from C++ (automation, preset recall)
    sliderState.valueChangedEvent.addListener(() => {
      updateVisuals(sliderState.getNormalisedValue());
    });

    // Initialize from current state
    updateVisuals(sliderState.getNormalisedValue());

    // Relative drag interaction
    let dragging = false;
    let lastY = 0;

    knob.addEventListener('mousedown', e => {
      e.preventDefault();
      dragging = true;
      lastY = e.clientY;
      document.body.style.cursor = 'grabbing';
      sliderState.sliderDragStarted();
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const deltaY = lastY - e.clientY;
      lastY = e.clientY;
      const currentNorm = sliderState.getNormalisedValue();
      const newNorm = Math.min(1, Math.max(0, currentNorm + deltaY / 200));
      sliderState.setNormalisedValue(newNorm);
    });

    window.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = false;
        document.body.style.cursor = '';
        sliderState.sliderDragEnded();
      }
    });

    // Double-click to reset
    knob.addEventListener('dblclick', () => {
      const norm = (cfg.defaultVal - cfg.min) / (cfg.max - cfg.min);
      sliderState.setNormalisedValue(norm);
    });
  });

  // LED subtle pulse
  const led = document.querySelector('.led');
  let pulseDir = 1;
  let pulseVal = 0.6;
  setInterval(() => {
    pulseVal += pulseDir * 0.02;
    if (pulseVal >= 0.8) pulseDir = -1;
    if (pulseVal <= 0.4) pulseDir = 1;
    led.style.boxShadow = `0 0 ${4 + pulseVal * 4}px rgba(212, 160, 74, ${pulseVal}), inset 0 1px 1px rgba(255, 255, 255, 0.3)`;
  }, 50);
</script>

</body>
</html>

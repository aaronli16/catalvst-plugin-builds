<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plate Reverb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .plugin-container {
            width: 400px;
            height: 500px;
            background: linear-gradient(145deg, #202020, #181818);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .plugin-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        .plugin-subtitle {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 60px;
        }

        .knob-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .knob-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .knob-glow {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.4), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(20px);
            pointer-events: none;
        }

        .knob {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 3px rgba(255, 255, 255, 0.1);
            cursor: grab;
            position: relative;
            transition: transform 0.1s ease;
        }

        .knob:active {
            cursor: grabbing;
            transform: scale(0.98);
        }

        .knob-indicator {
            position: absolute;
            width: 4px;
            height: 50px;
            background: linear-gradient(to bottom, #64c8ff, #4aa8dd);
            border-radius: 2px;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .knob-track {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid #2a2a2a;
        }

        .knob-progress {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #64c8ff;
            border-right-color: #64c8ff;
            transform: rotate(-135deg);
            transition: opacity 0.3s ease;
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
        }

        .knob-label {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
        }

        .knob-value {
            font-size: 32px;
            font-weight: 300;
            color: #64c8ff;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="plugin-title">Plate</div>
        <div class="plugin-subtitle">Reverb</div>
        
        <div class="knob-container">
            <div class="knob-wrapper">
                <div class="knob-glow" id="knobGlow"></div>
                <div class="knob-track"></div>
                <div class="knob-progress" id="knobProgress"></div>
                <div class="knob" id="knob">
                    <div class="knob-indicator"></div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <div class="knob-label">Wet</div>
                <div class="knob-value" id="knobValue">0%</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getSliderState } from './js/juce/index.js';

        // Get JUCE parameter state
        const wetState = getSliderState('WET');

        // UI elements
        const knob = document.getElementById('knob');
        const knobValue = document.getElementById('knobValue');
        const knobGlow = document.getElementById('knobGlow');
        const knobProgress = document.getElementById('knobProgress');

        let isDragging = false;
        let lastY = 0;
        let rotation = -135; // Start at minimum position

        // Convert normalized value (0.0-1.0) to rotation angle (-135 to 135 degrees)
        function valueToAngle(normalizedValue) {
            return -135 + (normalizedValue * 270);
        }

        // Update visual state based on normalized value (0.0-1.0)
        function updateKnobVisual(normalizedValue) {
            const angle = valueToAngle(normalizedValue);
            rotation = angle;
            knob.style.transform = `rotate(${angle}deg)`;
            
            // Update value display (0-100%)
            const percentValue = Math.round(normalizedValue * 100);
            knobValue.textContent = `${percentValue}%`;
            
            // Update glow intensity
            knobGlow.style.opacity = normalizedValue * 0.8;
            
            // Update progress ring
            knobProgress.style.transform = `rotate(${angle}deg)`;
            knobProgress.style.opacity = 0.3 + (normalizedValue * 0.7);
        }

        // Listen to parameter changes from plugin
        wetState.valueChangedEvent.addListener(() => {
            const value = wetState.getNormalisedValue();
            updateKnobVisual(value);
        });

        // Mouse down - start dragging
        knob.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastY = e.clientY;
            e.preventDefault();
        });

        // Mouse move - update value with relative drag
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaY = lastY - e.clientY;
            rotation += deltaY * 0.5;
            
            // Clamp rotation to -135 to 135 degrees
            rotation = Math.max(-135, Math.min(135, rotation));
            
            // Convert rotation to normalized value (0.0-1.0)
            const normalizedValue = (rotation + 135) / 270;
            
            // Send to JUCE backend
            wetState.setNormalisedValue(normalizedValue);
            
            lastY = e.clientY;
        });

        // Mouse up - stop dragging
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Double-click to reset to 0%
        knob.addEventListener('dblclick', () => {
            wetState.setNormalisedValue(0.0);
        });

        // Initialize with current value
        updateKnobVisual(wetState.getNormalisedValue());
    </script>
</body>
</html>

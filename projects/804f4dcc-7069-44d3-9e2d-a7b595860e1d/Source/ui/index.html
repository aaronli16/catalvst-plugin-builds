<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Reverb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Subtle film grain texture overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #999;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .knob-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .knob {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
            box-shadow: 
                -8px -8px 16px rgba(255, 255, 255, 0.8),
                8px 8px 16px rgba(0, 0, 0, 0.15),
                inset 0 0 0 1px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            position: relative;
            transition: box-shadow 0.1s ease;
        }

        .knob:active {
            box-shadow: 
                -4px -4px 8px rgba(255, 255, 255, 0.6),
                4px 4px 8px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .knob-indicator {
            position: absolute;
            top: 12px;
            left: 50%;
            width: 3px;
            height: 28px;
            background: #666;
            border-radius: 2px;
            transform-origin: center 48px;
            transition: background 0.2s ease;
        }

        .knob:hover .knob-indicator {
            background: #333;
        }

        .knob-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 600;
            color: #444;
            letter-spacing: -0.5px;
        }

        .knob-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
        }

        /* Subtle arc progress indicator */
        svg {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 130px;
            height: 130px;
            transform: rotate(-135deg);
            pointer-events: none;
        }

        .knob-arc-bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.06);
            stroke-width: 2;
        }

        .knob-arc {
            fill: none;
            stroke: rgba(0, 0, 0, 0.2);
            stroke-width: 2;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Hall Reverb</div>
        
        <div class="knob-container">
            <div class="knob-wrapper">
                <svg>
                    <circle class="knob-arc-bg" cx="65" cy="65" r="58" 
                            stroke-dasharray="257" stroke-dashoffset="0"/>
                    <circle class="knob-arc" cx="65" cy="65" r="58" 
                            stroke-dasharray="257" stroke-dashoffset="257"/>
                </svg>
                <input type="range" 
                       id="mix" 
                       min="0" 
                       max="1" 
                       step="0.01" 
                       value="0.5"
                       style="display: none;">
                <div class="knob" data-param="mix">
                    <div class="knob-indicator"></div>
                    <div class="knob-value">50%</div>
                </div>
            </div>
            <div class="knob-label">Mix</div>
        </div>
    </div>

    <script type="module">
        import { SliderValueBridge, __juce__ } from '/js/juce/index.js';

        class KnobController {
            constructor(element, inputElement) {
                this.knob = element;
                this.input = inputElement;
                this.indicator = element.querySelector('.knob-indicator');
                this.valueDisplay = element.querySelector('.knob-value');
                this.arc = element.parentElement.querySelector('.knob-arc');
                this.param = element.dataset.param;
                
                this.isDragging = false;
                this.startY = 0;
                this.startValue = 0;
                
                this.minAngle = -135;
                this.maxAngle = 135;
                this.sensitivity = 0.5;
                
                this.arcCircumference = 257;
                
                // Create bridge to connect input to JUCE backend
                this.bridge = new SliderValueBridge(this.input);
                
                this.init();
            }
            
            init() {
                this.knob.addEventListener('mousedown', this.onMouseDown.bind(this));
                document.addEventListener('mousemove', this.onMouseMove.bind(this));
                document.addEventListener('mouseup', this.onMouseUp.bind(this));
                
                this.knob.addEventListener('wheel', this.onWheel.bind(this), { passive: false });
                
                // Listen to input changes from backend
                this.input.addEventListener('input', () => {
                    this.updateDisplay();
                });
                
                this.updateDisplay();
            }
            
            onMouseDown(e) {
                e.preventDefault();
                this.isDragging = true;
                this.startY = e.clientY;
                this.startValue = parseFloat(this.input.value);
                document.body.style.cursor = 'grabbing';
            }
            
            onMouseMove(e) {
                if (!this.isDragging) return;
                
                const deltaY = this.startY - e.clientY;
                const deltaValue = (deltaY * this.sensitivity) / 100; // Normalized 0-1
                
                let newValue = this.startValue + deltaValue;
                newValue = Math.max(0, Math.min(1, newValue));
                
                this.input.value = newValue;
                this.input.dispatchEvent(new Event('input', { bubbles: true }));
                this.updateDisplay();
            }
            
            onMouseUp() {
                if (this.isDragging) {
                    this.isDragging = false;
                    document.body.style.cursor = 'default';
                }
            }
            
            onWheel(e) {
                e.preventDefault();
                const delta = -e.deltaY * 0.001; // Normalized delta
                let newValue = parseFloat(this.input.value) + delta;
                newValue = Math.max(0, Math.min(1, newValue));
                
                this.input.value = newValue;
                this.input.dispatchEvent(new Event('input', { bubbles: true }));
                this.updateDisplay();
            }
            
            updateDisplay() {
                const normalizedValue = parseFloat(this.input.value);
                const percentage = normalizedValue * 100;
                
                const angle = this.minAngle + normalizedValue * (this.maxAngle - this.minAngle);
                this.indicator.style.transform = `rotate(${angle}deg)`;
                this.valueDisplay.textContent = Math.round(percentage) + '%';
                
                // Update arc progress
                const offset = this.arcCircumference * (1 - normalizedValue);
                this.arc.style.strokeDashoffset = offset;
            }
        }
        
        // Wait for JUCE to be ready
        __juce__.initialisationData.then(() => {
            const inputElement = document.getElementById('mix');
            const knobElement = document.querySelector('.knob[data-param="mix"]');
            new KnobController(knobElement, inputElement);
        });
    </script>
</body>
</html>

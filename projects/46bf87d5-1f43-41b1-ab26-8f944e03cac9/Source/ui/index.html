<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascension</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 600px;
    height: 400px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0f;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #c8c8cc;
    user-select: none;
  }

  .plugin-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 32px;
    box-sizing: border-box;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  .plugin-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e0e0e4;
  }

  .plugin-tag {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a30, transparent);
    margin-bottom: 32px;
    flex-shrink: 0;
  }

  /* ── Knobs Row ── */
  .knobs-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 56px;
    flex: 1;
    width: 100%;
  }

  /* ── Single Knob Group ── */
  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .knob-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #666;
  }

  .knob-container {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .knob-svg {
    width: 90px;
    height: 90px;
    transform: rotate(0deg);
  }

  .knob-track {
    fill: none;
    stroke: #1a1a1e;
    stroke-width: 4;
    stroke-linecap: round;
  }

  .knob-fill {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.05s ease;
  }

  .knob-fill.time    { stroke: #6e7bff; }
  .knob-fill.feedback { stroke: #ff6e8a; }
  .knob-fill.mix      { stroke: #5ef0c0; }

  .knob-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    background: radial-gradient(circle at 40% 35%, #222228, #151518);
    border-radius: 50%;
    border: 1px solid #2a2a30;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .knob-center:active {
    cursor: grabbing;
  }

  .knob-indicator {
    width: 2px;
    height: 12px;
    border-radius: 1px;
    position: absolute;
    top: 6px;
    left: 50%;
    transform-origin: 50% 200%;
    transform: translateX(-50%) rotate(0deg);
  }

  .knob-indicator.time    { background: #6e7bff; }
  .knob-indicator.feedback { background: #ff6e8a; }
  .knob-indicator.mix      { background: #5ef0c0; }

  .knob-value {
    font-size: 13px;
    font-weight: 400;
    color: #999;
    letter-spacing: 0.5px;
    min-height: 18px;
    text-align: center;
  }

  /* ── Footer ── */
  .footer {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: auto;
    padding-top: 16px;
    flex-shrink: 0;
  }

  .sync-badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #444;
    border: 1px solid #222;
    padding: 4px 12px;
    border-radius: 3px;
  }

  .sync-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #5ef0c0;
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="plugin-root">

  <!-- Header -->
  <div class="header">
    <div class="plugin-name">Ascension</div>
    <div class="plugin-tag">Reverb · Delay</div>
  </div>
  <div class="divider"></div>

  <!-- Knobs -->
  <div class="knobs-row">

    <!-- TIME -->
    <div class="knob-group">
      <div class="knob-label">Time</div>
      <div class="knob-container" data-param="time">
        <svg class="knob-svg" viewBox="0 0 90 90">
          <circle class="knob-track" cx="45" cy="45" r="40" 
                  stroke-dasharray="201.06" stroke-dashoffset="-50.27"
                  transform="rotate(135 45 45)" />
          <circle class="knob-fill time" cx="45" cy="45" r="40"
                  stroke-dasharray="201.06" stroke-dashoffset="201.06"
                  transform="rotate(135 45 45)" />
        </svg>
        <div class="knob-center">
          <div class="knob-indicator time"></div>
        </div>
      </div>
      <div class="knob-value" data-value="time">1/4</div>
    </div>

    <!-- FEEDBACK -->
    <div class="knob-group">
      <div class="knob-label">Feedback</div>
      <div class="knob-container" data-param="feedback">
        <svg class="knob-svg" viewBox="0 0 90 90">
          <circle class="knob-track" cx="45" cy="45" r="40"
                  stroke-dasharray="201.06" stroke-dashoffset="-50.27"
                  transform="rotate(135 45 45)" />
          <circle class="knob-fill feedback" cx="45" cy="45" r="40"
                  stroke-dasharray="201.06" stroke-dashoffset="201.06"
                  transform="rotate(135 45 45)" />
        </svg>
        <div class="knob-center">
          <div class="knob-indicator feedback"></div>
        </div>
      </div>
      <div class="knob-value" data-value="feedback">35%</div>
    </div>

    <!-- MIX -->
    <div class="knob-group">
      <div class="knob-label">Mix</div>
      <div class="knob-container" data-param="mix">
        <svg class="knob-svg" viewBox="0 0 90 90">
          <circle class="knob-track" cx="45" cy="45" r="40"
                  stroke-dasharray="201.06" stroke-dashoffset="-50.27"
                  transform="rotate(135 45 45)" />
          <circle class="knob-fill mix" cx="45" cy="45" r="40"
                  stroke-dasharray="201.06" stroke-dashoffset="201.06"
                  transform="rotate(135 45 45)" />
        </svg>
        <div class="knob-center">
          <div class="knob-indicator mix"></div>
        </div>
      </div>
      <div class="knob-value" data-value="mix">50%</div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="sync-badge"><span class="sync-dot"></span>Tempo Sync</div>
  </div>

</div>

<script type="module">
  import { getSliderState } from './js/juce/index.js';

  // ── Config ──
  const ARC_DEGREES = 270;
  const RADIUS = 40;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
  const ARC_LENGTH = (ARC_DEGREES / 360) * CIRCUMFERENCE;

  // Note division labels matching parameter values 0-5
  const DIV_LABELS = ['1/4', '1/8', '1/8d', '1/4t', '1/2', '1/1'];

  // ── JUCE slider states ──
  const noteDivState = getSliderState("NOTE_DIV");
  const feedbackState = getSliderState("FEEDBACK");
  const mixState = getSliderState("MIX");

  // Map UI param names to JUCE states and display config
  const knobConfig = {
    time: {
      state: noteDivState,
      format: (norm) => {
        const idx = Math.round(norm * 5);
        return DIV_LABELS[Math.min(idx, 5)];
      }
    },
    feedback: {
      state: feedbackState,
      format: (norm) => Math.round(norm * 100) + '%'
    },
    mix: {
      state: mixState,
      format: (norm) => Math.round(norm * 100) + '%'
    }
  };

  // ── Visual update ──
  function updateKnobVisuals(paramName, normValue) {
    const val = Math.max(0, Math.min(1, normValue));
    const container = document.querySelector(`.knob-container[data-param="${paramName}"]`);
    if (!container) return;

    const fillCircle = container.querySelector('.knob-fill');
    const offset = ARC_LENGTH - (val * ARC_LENGTH);
    fillCircle.style.strokeDasharray = `${ARC_LENGTH} ${CIRCUMFERENCE}`;
    fillCircle.style.strokeDashoffset = offset;

    const indicator = container.querySelector('.knob-indicator');
    const angle = -135 + (val * 270);
    indicator.style.transform = `translateX(-50%) rotate(${angle}deg)`;

    const display = document.querySelector(`[data-value="${paramName}"]`);
    display.textContent = knobConfig[paramName].format(val);
  }

  // ── Listen for value changes from C++ (automation, presets) ──
  noteDivState.valueChangedEvent.addListener(() => {
    updateKnobVisuals('time', noteDivState.getNormalisedValue());
  });
  feedbackState.valueChangedEvent.addListener(() => {
    updateKnobVisuals('feedback', feedbackState.getNormalisedValue());
  });
  mixState.valueChangedEvent.addListener(() => {
    updateKnobVisuals('mix', mixState.getNormalisedValue());
  });

  // ── Drag logic (relative / frame-delta) ──
  let activeParam = null;
  let lastY = 0;

  function onPointerDown(e) {
    const container = e.currentTarget;
    activeParam = container.dataset.param;
    lastY = e.clientY;
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!activeParam) return;
    const config = knobConfig[activeParam];
    const deltaY = lastY - e.clientY;
    lastY = e.clientY;

    const sensitivity = activeParam === 'time' ? 0.008 : 0.005;
    let newVal = config.state.getNormalisedValue() + deltaY * sensitivity;
    newVal = Math.max(0, Math.min(1, newVal));

    config.state.setNormalisedValue(newVal);
  }

  function onPointerUp() {
    if (!activeParam) return;
    activeParam = null;
    document.body.style.cursor = '';
  }

  document.querySelectorAll('.knob-container').forEach(container => {
    container.addEventListener('pointerdown', onPointerDown);
  });
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);

  // ── Double-click to reset ──
  document.querySelectorAll('.knob-container').forEach(container => {
    container.addEventListener('dblclick', () => {
      const name = container.dataset.param;
      const config = knobConfig[name];
      // Reset to default normalised values
      if (name === 'time') config.state.setNormalisedValue(3.0 / 5.0);       // 1/4t
      else if (name === 'feedback') config.state.setNormalisedValue(0.4 / 0.9); // 0.4
      else if (name === 'mix') config.state.setNormalisedValue(0.5);            // 50%
    });
  });

  // ── Init from current C++ values ──
  updateKnobVisuals('time', noteDivState.getNormalisedValue());
  updateKnobVisuals('feedback', feedbackState.getNormalisedValue());
  updateKnobVisuals('mix', mixState.getNormalisedValue());
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hearth - Warm Plate Reverb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 600px;
            height: 400px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        .plugin-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .header {
            margin-bottom: 60px;
        }

        .title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #e8e8e8;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 48px;
            align-items: center;
            justify-content: center;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .knob-visual {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #3a3a3a;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s;
            box-shadow: 
                inset 0 2px 8px rgba(0,0,0,0.4),
                0 2px 6px rgba(0,0,0,0.3);
        }

        .knob-visual:hover {
            border-color: #4a4a4a;
        }

        .knob-visual::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: #d4a574;
            transform: translateX(-50%);
            transform-origin: center 32px;
            border-radius: 1px;
            box-shadow: 0 0 4px rgba(212, 165, 116, 0.4);
        }

        .knob-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #999;
            text-transform: uppercase;
        }

        .knob-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="header">
            <div class="title">Hearth</div>
        </div>
        
        <div class="controls">
            <div class="knob-container">
                <div class="knob-visual" data-knob="decay">
                    <input type="range" class="knob-input" data-param="Decay Rate" min="0" max="1" value="0.7" step="0.01">
                </div>
                <div class="knob-label">Decay</div>
            </div>

            <div class="knob-container">
                <div class="knob-visual" data-knob="damping">
                    <input type="range" class="knob-input" data-param="Damping" min="0" max="1" value="0.625" step="0.01">
                </div>
                <div class="knob-label">Damping</div>
            </div>

            <div class="knob-container">
                <div class="knob-visual" data-knob="mix">
                    <input type="range" class="knob-input" data-param="Dry/Wet Mix" min="0" max="1" value="0.5" step="0.01">
                </div>
                <div class="knob-label">Mix</div>
            </div>
        </div>
    </div>

    <script>
        // Knob rotation interaction
        const knobs = document.querySelectorAll('.knob-visual');
        
        knobs.forEach(knobVisual => {
            const input = knobVisual.querySelector('.knob-input');
            let isDragging = false;
            let startY = 0;
            let startValue = 0;

            function updateRotation() {
                const value = parseFloat(input.value);
                const min = parseFloat(input.min);
                const max = parseFloat(input.max);
                const normalized = (value - min) / (max - min);
                const degrees = (normalized * 270) - 135;
                knobVisual.style.setProperty('--rotation', `${degrees}deg`);
                knobVisual.querySelector('::before').style.transform = `translateX(-50%) rotate(${degrees}deg)`;
            }

            function setRotation(value) {
                const min = parseFloat(input.min);
                const max = parseFloat(input.max);
                const normalized = (value - min) / (max - min);
                const degrees = (normalized * 270) - 135;
                const beforeElement = knobVisual.querySelector('::before');
                if (beforeElement) {
                    beforeElement.style.transform = `translateX(-50%) rotate(${degrees}deg)`;
                }
                // Apply rotation to the ::before pseudo-element via custom property
                knobVisual.style.setProperty('--knob-rotation', `${degrees}deg`);
            }

            function handleStart(e) {
                isDragging = true;
                startY = e.clientY || e.touches[0].clientY;
                startValue = parseFloat(input.value);
                knobVisual.style.cursor = 'grabbing';
                e.preventDefault();
            }

            function handleMove(e) {
                if (!isDragging) return;
                
                const currentY = e.clientY || e.touches[0].clientY;
                const deltaY = startY - currentY;
                const sensitivity = 0.005;
                
                const min = parseFloat(input.min);
                const max = parseFloat(input.max);
                const range = max - min;
                
                let newValue = startValue + (deltaY * sensitivity * range);
                newValue = Math.max(min, Math.min(max, newValue));
                
                input.value = newValue;
                input.dispatchEvent(new Event('input', { bubbles: true }));
                setRotation(newValue);
            }

            function handleEnd() {
                isDragging = false;
                knobVisual.style.cursor = 'pointer';
            }

            knobVisual.addEventListener('mousedown', handleStart);
            knobVisual.addEventListener('touchstart', handleStart);
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove);
            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchend', handleEnd);

            // Initialize rotation
            setRotation(parseFloat(input.value));
        });

        // Update CSS custom property for rotation
        const style = document.createElement('style');
        style.textContent = `
            .knob-visual::before {
                transform: translateX(-50%) rotate(var(--knob-rotation, -135deg));
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

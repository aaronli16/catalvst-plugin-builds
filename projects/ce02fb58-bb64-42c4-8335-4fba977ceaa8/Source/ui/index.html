<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cathedral Reverb</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  :root {
    --bg-deep: #0a0a10;
    --bg-dark: #12121e;
    --bg-panel: #181828;
    --bg-inset: #0e0e1a;
    --gold-dark: #6b5a2e;
    --gold: #b8963e;
    --gold-light: #d4b458;
    --gold-bright: #f0d070;
    --gold-glow: rgba(184, 150, 62, 0.3);
    --text-dim: #6a6a8a;
    --text-mid: #9a9ab8;
    --text-light: #d0d0e8;
    --shimmer-purple: #8a6abf;
    --shimmer-blue: #5a7abf;
    --shimmer-glow: rgba(138, 106, 191, 0.4);
  }

  body {
    font-family: 'Cinzel', serif;
    background: var(--bg-deep);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== PLUGIN FRAME ===== */
  .plugin-frame {
    width: 720px;
    height: 480px;
    background: var(--bg-dark);
    border-radius: 16px;
    border: 1px solid var(--gold-dark);
    box-shadow:
      0 0 60px rgba(0, 0, 0, 0.8),
      0 0 30px rgba(184, 150, 62, 0.05),
      inset 0 1px 0 rgba(184, 150, 62, 0.1);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Gothic corner ornaments */
  .plugin-frame::before,
  .plugin-frame::after {
    content: '';
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: var(--gold-dark);
    border-style: solid;
    opacity: 0.6;
    pointer-events: none;
  }

  .plugin-frame::before {
    top: 8px;
    left: 8px;
    border-width: 2px 0 0 2px;
    border-radius: 4px 0 0 0;
  }

  .plugin-frame::after {
    top: 8px;
    right: 8px;
    border-width: 2px 2px 0 0;
    border-radius: 0 4px 0 0;
  }

  .corner-bottom-left,
  .corner-bottom-right {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: var(--gold-dark);
    border-style: solid;
    opacity: 0.6;
    pointer-events: none;
  }

  .corner-bottom-left {
    bottom: 8px;
    left: 8px;
    border-width: 0 0 2px 2px;
    border-radius: 0 0 0 4px;
  }

  .corner-bottom-right {
    bottom: 8px;
    right: 8px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 4px 0;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 20px 0 10px;
    position: relative;
  }

  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--gold-glow), 0 2px 4px rgba(0,0,0,0.5);
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 6px;
  }

  .header-ornament .line {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  }

  .header-ornament .diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.7;
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ===== VISUALIZER ===== */
  .visualizer-section {
    padding: 0 30px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .visualizer {
    width: 100%;
    height: 90px;
    background: var(--bg-inset);
    border-radius: 8px;
    border: 1px solid rgba(107, 90, 46, 0.2);
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  .visualizer canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ===== CONTROLS SECTION ===== */
  .controls-section {
    flex: 1;
    display: flex;
    padding: 10px 30px 0;
    gap: 20px;
  }

  /* Main knobs area */
  .main-knobs {
    flex: 1;
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 5px;
  }

  /* ===== KNOB ===== */
  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .knob-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .knob-container {
    position: relative;
    width: 72px;
    height: 72px;
    cursor: pointer;
  }

  .knob-svg {
    width: 100%;
    height: 100%;
  }

  .knob-track {
    fill: none;
    stroke: rgba(107, 90, 46, 0.15);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .knob-arc {
    fill: none;
    stroke: url(#goldGradient);
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 0 4px var(--gold-glow));
    transition: stroke-dashoffset 0.05s ease;
  }

  .knob-body {
    fill: var(--bg-panel);
    stroke: var(--gold-dark);
    stroke-width: 1;
  }

  .knob-indicator {
    stroke: var(--gold-light);
    stroke-width: 2;
    stroke-linecap: round;
    filter: drop-shadow(0 0 3px var(--gold-glow));
  }

  .knob-value {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold-light);
    text-align: center;
    min-width: 50px;
    height: 16px;
    line-height: 16px;
  }

  /* ===== SHIMMER PANEL ===== */
  .shimmer-panel {
    width: 170px;
    background: var(--bg-inset);
    border-radius: 10px;
    border: 1px solid rgba(107, 90, 46, 0.2);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
  }

  .shimmer-title {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--shimmer-purple);
    text-shadow: 0 0 10px var(--shimmer-glow);
  }

  /* Toggle switch */
  .toggle-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .toggle {
    width: 38px;
    height: 20px;
    background: var(--bg-deep);
    border-radius: 10px;
    border: 1px solid rgba(107, 90, 46, 0.3);
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .toggle.active {
    border-color: var(--shimmer-purple);
    box-shadow: 0 0 10px var(--shimmer-glow);
  }

  .toggle-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    position: absolute;
    top: 2px;
    left: 2px;
    transition: all 0.3s ease;
  }

  .toggle.active .toggle-thumb {
    left: 20px;
    background: var(--shimmer-purple);
    box-shadow: 0 0 8px var(--shimmer-glow);
  }

  /* Shimmer knobs - smaller */
  .shimmer-knobs {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .shimmer-knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .shimmer-knob-group .knob-container {
    width: 52px;
    height: 52px;
  }

  .shimmer-knob-group .knob-label {
    font-size: 7px;
    letter-spacing: 2px;
    color: rgba(138, 106, 191, 0.5);
  }

  .shimmer-knob-group .knob-value {
    font-size: 9px;
    color: var(--shimmer-purple);
  }

  .shimmer-knob-group .knob-arc {
    stroke: url(#shimmerGradient);
    filter: drop-shadow(0 0 4px var(--shimmer-glow));
  }

  .shimmer-knob-group .knob-track {
    stroke: rgba(138, 106, 191, 0.1);
  }

  .shimmer-knob-group .knob-body {
    stroke: rgba(138, 106, 191, 0.3);
  }

  .shimmer-knob-group .knob-indicator {
    stroke: var(--shimmer-purple);
    filter: drop-shadow(0 0 3px var(--shimmer-glow));
  }

  /* ===== FOOTER ===== */
  .footer {
    padding: 8px 30px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .footer-ornament {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .footer-ornament .line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(107, 90, 46, 0.3), transparent);
  }

  .footer-ornament .cross {
    font-size: 12px;
    color: var(--gold-dark);
    opacity: 0.5;
  }

  /* ===== AMBIENT PARTICLES ===== */
  .particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp 8s infinite ease-in-out;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(100%) scale(0.5); }
    20% { opacity: 0.3; }
    80% { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-100%) scale(1); }
  }

  /* Shimmer active state glow */
  .shimmer-panel.active {
    border-color: rgba(138, 106, 191, 0.3);
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3), 0 0 15px rgba(138, 106, 191, 0.08);
  }
</style>
</head>
<body>

<div class="plugin-frame">
  <div class="corner-bottom-left"></div>
  <div class="corner-bottom-right"></div>

  <!-- Ambient particles -->
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <div class="header">
    <h1>Cathedral</h1>
    <div class="header-ornament">
      <div class="line"></div>
      <div class="diamond"></div>
      <div class="line"></div>
    </div>
    <div class="subtitle">Ethereal Reverb</div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer-section">
    <div class="visualizer">
      <canvas id="reverbCanvas"></canvas>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-section">
    <!-- Main Knobs -->
    <div class="main-knobs">
      <div class="knob-group">
        <div class="knob-label">Decay</div>
        <div class="knob-container" data-param="decay" data-min="0.5" data-max="20" data-value="6.0" data-unit="s" data-decimals="1">
          <svg class="knob-svg" viewBox="0 0 72 72"></svg>
        </div>
        <div class="knob-value">6.0s</div>
      </div>

      <div class="knob-group">
        <div class="knob-label">Size</div>
        <div class="knob-container" data-param="size" data-min="0" data-max="100" data-value="75" data-unit="%" data-decimals="0">
          <svg class="knob-svg" viewBox="0 0 72 72"></svg>
        </div>
        <div class="knob-value">75%</div>
      </div>

      <div class="knob-group">
        <div class="knob-label">Damping</div>
        <div class="knob-container" data-param="damping" data-min="0" data-max="100" data-value="40" data-unit="%" data-decimals="0">
          <svg class="knob-svg" viewBox="0 0 72 72"></svg>
        </div>
        <div class="knob-value">40%</div>
      </div>

      <div class="knob-group">
        <div class="knob-label">Mix</div>
        <div class="knob-container" data-param="mix" data-min="0" data-max="100" data-value="35" data-unit="%" data-decimals="0">
          <svg class="knob-svg" viewBox="0 0 72 72"></svg>
        </div>
        <div class="knob-value">35%</div>
      </div>
    </div>

    <!-- Shimmer Panel -->
    <div class="shimmer-panel" id="shimmerPanel">
      <div class="shimmer-title">Shimmer</div>
      <div class="toggle-container">
        <div class="toggle" id="shimmerToggle">
          <div class="toggle-thumb"></div>
        </div>
      </div>
      <div class="shimmer-knobs">
        <div class="shimmer-knob-group knob-group">
          <div class="knob-label">Tone</div>
          <div class="knob-container" data-param="shimmerTone" data-min="0" data-max="100" data-value="60" data-unit="%" data-decimals="0">
            <svg class="knob-svg" viewBox="0 0 52 52"></svg>
          </div>
          <div class="knob-value">60%</div>
        </div>
        <div class="shimmer-knob-group knob-group">
          <div class="knob-label">Amount</div>
          <div class="knob-container" data-param="shimmerAmount" data-min="0" data-max="100" data-value="30" data-unit="%" data-decimals="0">
            <svg class="knob-svg" viewBox="0 0 52 52"></svg>
          </div>
          <div class="knob-value">30%</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-ornament">
      <div class="line"></div>
      <div class="cross">✦</div>
      <div class="line"></div>
    </div>
  </div>
</div>

<!-- SVG Gradient Definitions -->
<svg style="position:absolute;width:0;height:0;">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8963e"/>
      <stop offset="100%" stop-color="#d4b458"/>
    </linearGradient>
    <linearGradient id="shimmerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a5aaf"/>
      <stop offset="100%" stop-color="#5a7abf"/>
    </linearGradient>
  </defs>
</svg>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // ===== KNOB RENDERING =====
  const ARC_START = (3 * Math.PI) / 4;   // 135 degrees
  const ARC_END   = (9 * Math.PI) / 4;   // 405 degrees (wraps)
  const ARC_RANGE = ARC_END - ARC_START;  // 270 degrees

  function polarToCartesian(cx, cy, r, angle) {
    return {
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle)
    };
  }

  function describeArc(cx, cy, r, startAngle, endAngle) {
    const start = polarToCartesian(cx, cy, r, startAngle);
    const end = polarToCartesian(cx, cy, r, endAngle);
    const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
    return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
  }

  function renderKnob(container) {
    const svg = container.querySelector('.knob-svg');
    const viewBox = svg.getAttribute('viewBox').split(' ');
    const size = parseFloat(viewBox[2]);
    const cx = size / 2;
    const cy = size / 2;
    const outerR = size * 0.44;
    const innerR = size * 0.32;
    const indicatorInner = size * 0.18;
    const indicatorOuter = size * 0.30;

    const isShimmer = container.closest('.shimmer-knob-group') !== null;
    const gradientId = isShimmer ? 'shimmerGradient' : 'goldGradient';

    // Track
    const track = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    track.setAttribute('d', describeArc(cx, cy, outerR, ARC_START, ARC_END));
    track.setAttribute('class', 'knob-track');
    svg.appendChild(track);

    // Value arc
    const arc = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    arc.setAttribute('class', 'knob-arc');
    arc.setAttribute('stroke', `url(#${gradientId})`);
    svg.appendChild(arc);

    // Knob body
    const body = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    body.setAttribute('cx', cx);
    body.setAttribute('cy', cy);
    body.setAttribute('r', innerR);
    body.setAttribute('class', 'knob-body');
    svg.appendChild(body);

    // Indicator line
    const indicator = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    indicator.setAttribute('class', 'knob-indicator');
    svg.appendChild(indicator);

    container._arc = arc;
    container._indicator = indicator;
    container._cx = cx;
    container._cy = cy;
    container._outerR = outerR;
    container._indicatorInner = indicatorInner;
    container._indicatorOuter = indicatorOuter;

    updateKnobVisual(container);
  }

  function updateKnobVisual(container) {
    const min = parseFloat(container.dataset.min);
    const max = parseFloat(container.dataset.max);
    const value = parseFloat(container.dataset.value);
    const norm = (value - min) / (max - min);

    const cx = container._cx;
    const cy = container._cy;
    const outerR = container._outerR;

    // Arc
    const endAngle = ARC_START + norm * ARC_RANGE;
    if (norm > 0.005) {
      container._arc.setAttribute('d', describeArc(cx, cy, outerR, ARC_START, endAngle));
      container._arc.style.display = '';
    } else {
      container._arc.style.display = 'none';
    }

    // Indicator
    const angle = ARC_START + norm * ARC_RANGE;
    const inner = polarToCartesian(cx, cy, container._indicatorInner, angle);
    const outer = polarToCartesian(cx, cy, container._indicatorOuter, angle);
    container._indicator.setAttribute('x1', inner.x);
    container._indicator.setAttribute('y1', inner.y);
    container._indicator.setAttribute('x2', outer.x);
    container._indicator.setAttribute('y2', outer.y);

    // Value text
    const decimals = parseInt(container.dataset.decimals);
    const unit = container.dataset.unit;
    const display = value.toFixed(decimals) + unit;
    const group = container.closest('.knob-group');
    if (group) {
      group.querySelector('.knob-value').textContent = display;
    }
  }

  // Initialize all knobs
  const knobContainers = document.querySelectorAll('.knob-container');
  knobContainers.forEach(renderKnob);

  // ===== KNOB INTERACTION =====
  let activeKnob = null;
  let startY = 0;
  let startValue = 0;

  function onPointerDown(e) {
    const container = e.target.closest('.knob-container');
    if (!container) return;

    activeKnob = container;
    startY = e.clientY;
    startValue = parseFloat(container.dataset.value);
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!activeKnob) return;

    const min = parseFloat(activeKnob.dataset.min);
    const max = parseFloat(activeKnob.dataset.max);
    const range = max - min;
    const sensitivity = range / 200;

    const dy = startY - e.clientY;
    let newValue = startValue + dy * sensitivity;
    newValue = Math.max(min, Math.min(max, newValue));

    activeKnob.dataset.value = newValue;
    updateKnobVisual(activeKnob);

    // Send to DAW
    const param = activeKnob.dataset.param;
    const norm = (newValue - min) / (max - min);
    if (window.__JUCE__) {
      window.__JUCE__.backend.parameterChanged(param, norm);
    }
  }

  function onPointerUp() {
    if (activeKnob) {
      activeKnob = null;
      document.body.style.cursor = '';
    }
  }

  document.addEventListener('pointerdown', onPointerDown);
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);

  // Double-click to reset
  document.addEventListener('dblclick', (e) => {
    const container = e.target.closest('.knob-container');
    if (!container) return;
    const defaults = { decay: 6.0, size: 75, damping: 40, mix: 35, shimmerTone: 60, shimmerAmount: 30 };
    const param = container.dataset.param;
    if (defaults[param] !== undefined) {
      container.dataset.value = defaults[param];
      updateKnobVisual(container);
    }
  });

  // ===== SHIMMER TOGGLE =====
  const shimmerToggle = document.getElementById('shimmerToggle');
  const shimmerPanel = document.getElementById('shimmerPanel');
  let shimmerActive = false;

  shimmerToggle.addEventListener('click', () => {
    shimmerActive = !shimmerActive;
    shimmerToggle.classList.toggle('active', shimmerActive);
    shimmerPanel.classList.toggle('active', shimmerActive);

    if (window.__JUCE__) {
      window.__JUCE__.backend.parameterChanged('shimmerEnabled', shimmerActive ? 1 : 0);
    }
  });

  // ===== REVERB VISUALIZATION =====
  const canvas = document.getElementById('reverbCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let time = 0;

  function drawVisualization() {
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    ctx.clearRect(0, 0, w, h);

    const decay = parseFloat(document.querySelector('[data-param="decay"]').dataset.value);
    const size = parseFloat(document.querySelector('[data-param="size"]').dataset.value) / 100;
    const mix = parseFloat(document.querySelector('[data-param="mix"]').dataset.value) / 100;
    const damping = parseFloat(document.querySelector('[data-param="damping"]').dataset.value) / 100;

    const midY = h / 2;
    time += 0.012;

    // Draw reverb tail shape - multiple layers
    const layers = 4;
    for (let l = 0; l < layers; l++) {
      ctx.beginPath();
      const layerOffset = l * 0.3;
      const alpha = (0.15 - l * 0.03) * mix * 1.5;

      for (let x = 0; x <= w; x += 1) {
        const xNorm = x / w;

        // Envelope: fast attack, slow exponential decay
        const decayRate = 3.0 / (decay * 0.5 + 0.5);
        let envelope;
        if (xNorm < 0.05) {
          envelope = xNorm / 0.05;
        } else {
          envelope = Math.exp(-(xNorm - 0.05) * decayRate * 4);
        }

        // Damping reduces high frequency content over time
        const freqBase = 3 + size * 6;
        const freq = freqBase * (1 - damping * xNorm * 0.5);

        const wave =
          Math.sin(x * 0.05 * freq / 3 + time * 2 + layerOffset) * 0.4 +
          Math.sin(x * 0.03 * freq / 3 + time * 1.3 + layerOffset * 2) * 0.3 +
          Math.sin(x * 0.08 * freq / 3 + time * 3.1 + layerOffset * 0.5) * 0.2 +
          Math.sin(x * 0.02 + time * 0.7 + l) * 0.1;

        const amplitude = envelope * (h * 0.35) * mix;
        const y = midY + wave * amplitude;

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      // Shimmer sparkles in the waveform
      if (shimmerActive) {
        const shimmerAmt = parseFloat(document.querySelector('[data-param="shimmerAmount"]').dataset.value) / 100;
        ctx.strokeStyle = `rgba(138, 106, 191, ${alpha * shimmerAmt * 1.5})`;
      } else {
        ctx.strokeStyle = `rgba(184, 150, 62, ${alpha})`;
      }

      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // Draw shimmer particles if active
    if (shimmerActive) {
      const shimmerAmt = parseFloat(document.querySelector('[data-param="shimmerAmount"]').dataset.value) / 100;
      const numParticles = Math.floor(12 * shimmerAmt);
      for (let i = 0; i < numParticles; i++) {
        const px = ((Math.sin(time * 0.5 + i * 2.1) + 1) / 2) * w;
        const py = ((Math.sin(time * 0.8 + i * 1.7) + 1) / 2) * h;
        const sparkleAlpha = (Math.sin(time * 3 + i * 4) + 1) / 2 * 0.5 * shimmerAmt;
        const sparkleSize = 1 + Math.sin(time * 2 + i) * 0.5;

        ctx.beginPath();
        ctx.arc(px, py, sparkleSize, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160, 130, 210, ${sparkleAlpha})`;
        ctx.fill();
      }
    }

    // Center line (very subtle)
    ctx.beginPath();
    ctx.moveTo(0, midY);
    ctx.lineTo(w, midY);
    ctx.strokeStyle = 'rgba(184, 150, 62, 0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();

    requestAnimationFrame(drawVisualization);
  }

  drawVisualization();

  // ===== AMBIENT PARTICLES =====
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    particlesContainer.appendChild(p);
  }

  // ===== JUCE PARAMETER UPDATES FROM BACKEND =====
  if (window.__JUCE__) {
    window.__JUCE__.backend.addEventListener('parameterUpdate', (event) => {
      const { name, value } = event.detail;
      const container = document.querySelector(`[data-param="${name}"]`);
      if (container) {
        const min = parseFloat(container.dataset.min);
        const max = parseFloat(container.dataset.max);
        container.dataset.value = min + value * (max - min);
        updateKnobVisual(container);
      }
      if (name === 'shimmerEnabled') {
        shimmerActive = value > 0.5;
        shimmerToggle.classList.toggle('active', shimmerActive);
        shimmerPanel.classList.toggle('active', shimmerActive);
      }
    });
  }

});
</script>
</body>
</html>

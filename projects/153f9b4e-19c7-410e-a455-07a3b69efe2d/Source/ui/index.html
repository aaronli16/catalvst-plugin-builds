<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 600px;
            height: 400px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
        }

        .plugin-title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 50px;
            color: #c9a870;
            text-shadow: 0 2px 10px rgba(201, 168, 112, 0.3);
        }

        .controls-container {
            display: flex;
            gap: 32px;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob-wrapper {
            width: 90px;
            height: 90px;
            position: relative;
            cursor: pointer;
        }

        .knob {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.5),
                inset 0 2px 5px rgba(255, 255, 255, 0.05);
            position: relative;
            transition: box-shadow 0.2s;
        }

        .knob:hover {
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.6),
                inset 0 2px 5px rgba(255, 255, 255, 0.08);
        }

        .knob-indicator {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 28px;
            background: linear-gradient(180deg, #c9a870 0%, #a08860 100%);
            border-radius: 2px;
            box-shadow: 0 2px 6px rgba(201, 168, 112, 0.5);
        }

        .knob-label {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a0a0a0;
        }

        .knob-value {
            font-size: 11px;
            color: #707070;
            font-family: 'Courier New', monospace;
            min-width: 60px;
            text-align: center;
        }

        input[type="range"] {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .vu-indicator {
            width: 200px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .vu-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #c9a870 0%, #e0c090 100%);
            transition: width 0.1s ease-out;
            box-shadow: 0 0 8px rgba(201, 168, 112, 0.6);
        }
    </style>
</head>
<body>
    <div class="plugin-title">Charm</div>

    <div class="controls-container">
        <div class="knob-container">
            <div class="knob-wrapper">
                <div class="knob" data-knob="decay">
                    <div class="knob-indicator"></div>
                </div>
                <input 
                    type="range" 
                    data-param="Decay" 
                    min="0" 
                    max="1" 
                    value="0.65" 
                    step="0.01"
                    id="decay-slider">
            </div>
            <div class="knob-label">Decay</div>
            <div class="knob-value" id="decay-value">0.65</div>
        </div>

        <div class="knob-container">
            <div class="knob-wrapper">
                <div class="knob" data-knob="mix">
                    <div class="knob-indicator"></div>
                </div>
                <input 
                    type="range" 
                    data-param="Mix" 
                    min="0" 
                    max="1" 
                    value="0.35" 
                    step="0.01"
                    id="mix-slider">
            </div>
            <div class="knob-label">Mix</div>
            <div class="knob-value" id="mix-value">35%</div>
        </div>

        <div class="knob-container">
            <div class="knob-wrapper">
                <div class="knob" data-knob="tone">
                    <div class="knob-indicator"></div>
                </div>
                <input 
                    type="range" 
                    data-param="Tone" 
                    min="0" 
                    max="1" 
                    value="0.6" 
                    step="0.01"
                    id="tone-slider">
            </div>
            <div class="knob-label">Tone</div>
            <div class="knob-value" id="tone-value">5.0k</div>
        </div>
    </div>

    <div class="vu-indicator">
        <div class="vu-bar" id="vu-bar"></div>
    </div>

    <script>
        // Knob rotation and visual feedback
        const knobs = document.querySelectorAll('[data-knob]');
        
        knobs.forEach(knobEl => {
            const knobType = knobEl.dataset.knob;
            const slider = document.getElementById(`${knobType}-slider`);
            const valueDisplay = document.getElementById(`${knobType}-value`);
            const indicator = knobEl.querySelector('.knob-indicator');
            
            let isDragging = false;
            let startY = 0;
            let startValue = 0;

            // Update visual rotation based on slider value
            function updateKnobRotation() {
                const value = parseFloat(slider.value);
                // Map 0-1 to -135deg to +135deg (270 degree sweep)
                const degrees = (value * 270) - 135;
                indicator.style.transform = `translateX(-50%) rotate(${degrees}deg)`;
                indicator.style.transformOrigin = 'center 35px';
                
                // Update value display
                if (knobType === 'decay') {
                    valueDisplay.textContent = value.toFixed(2);
                } else if (knobType === 'mix') {
                    valueDisplay.textContent = Math.round(value * 100) + '%';
                } else if (knobType === 'tone') {
                    // Map 0-1 to 500-8000 Hz
                    const freq = 500 + (value * 7500);
                    if (freq >= 1000) {
                        valueDisplay.textContent = (freq / 1000).toFixed(1) + 'k';
                    } else {
                        valueDisplay.textContent = Math.round(freq) + 'Hz';
                    }
                }
            }

            // Mouse drag for knob control
            knobEl.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.clientY;
                startValue = parseFloat(slider.value);
                knobEl.classList.add('dragging');
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaY = startY - e.clientY;
                const sensitivity = 0.005;
                let newValue = startValue + (deltaY * sensitivity);
                newValue = Math.max(0, Math.min(1, newValue));
                
                slider.value = newValue;
                slider.dispatchEvent(new Event('input', { bubbles: true }));
                updateKnobRotation();
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    knobEl.classList.remove('dragging');
                }
            });

            // Listen for programmatic changes (automation, preset recall)
            slider.addEventListener('input', updateKnobRotation);
            
            // Initialize rotation
            updateKnobRotation();
        });

        // VU meter animation (decorative)
        const vuBar = document.getElementById('vu-bar');
        let vuLevel = 0;
        
        setInterval(() => {
            // Simulate reverb presence with random fluctuation
            const target = Math.random() * 60 + 20;
            vuLevel += (target - vuLevel) * 0.1;
            vuBar.style.width = vuLevel + '%';
        }, 50);
    </script>
</body>
</html>

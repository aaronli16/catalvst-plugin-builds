<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 500px;
    height: 340px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0e10;
    font-family: 'Inter', sans-serif;
    color: #d0d0d4;
    -webkit-font-smoothing: antialiased;
  }

  .plugin-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px 20px;
    box-sizing: border-box;
    background: linear-gradient(180deg, #111114 0%, #0c0c0e 100%);
    border: 1px solid #1e1e24;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e0e0e4;
  }

  .header .subtitle {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #505058;
  }

  /* Ping Pong Indicator */
  .ping-pong-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #2a2a32;
  }

  .dot.left { background: #4a9eff; opacity: 0.7; }
  .dot.right { background: #4a9eff; opacity: 0.7; }
  .dot.center { width: 3px; height: 3px; background: #333; }

  .indicator-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, #4a9eff22, #4a9eff44, #4a9eff22);
  }

  /* Knobs Row */
  .knobs-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    margin-bottom: 20px;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .knob-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555560;
  }

  .knob-container {
    position: relative;
    width: 72px;
    height: 72px;
    cursor: grab;
  }

  .knob-container:active { cursor: grabbing; }

  .knob-svg {
    width: 100%;
    height: 100%;
  }

  .knob-track {
    fill: none;
    stroke: #1a1a22;
    stroke-width: 3;
    stroke-linecap: round;
  }

  .knob-fill {
    fill: none;
    stroke: #4a9eff;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.05s ease;
    filter: drop-shadow(0 0 4px #4a9eff44);
  }

  .knob-dot {
    fill: #e0e0e8;
    transition: transform 0.05s ease;
  }

  .knob-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #c8c8d0;
    letter-spacing: 0.5px;
    min-width: 50px;
    text-align: center;
  }

  /* Tempo Sync Selector */
  .sync-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }

  .sync-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555560;
  }

  .sync-options {
    display: flex;
    gap: 2px;
    background: #111116;
    border: 1px solid #1e1e24;
    border-radius: 4px;
    padding: 2px;
  }

  .sync-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: #44444c;
    background: transparent;
    border: none;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.3px;
  }

  .sync-btn:hover {
    color: #888890;
  }

  .sync-btn.active {
    background: #1a1a24;
    color: #4a9eff;
    box-shadow: 0 0 8px #4a9eff18;
  }

</style>
</head>
<body>

<div class="plugin-root">

  <!-- Header -->
  <div class="header">
    <h1>Metronome</h1>
    <span class="subtitle">Ping Pong Delay</span>
  </div>

  <!-- Stereo Indicator -->
  <div class="ping-pong-indicator">
    <div class="dot left"></div>
    <div class="indicator-line"></div>
    <div class="dot center"></div>
    <div class="indicator-line"></div>
    <div class="dot right"></div>
  </div>

  <!-- Knobs -->
  <div class="knobs-row">

    <!-- TIME -->
    <div class="knob-group">
      <span class="knob-label">Time</span>
      <div class="knob-container" data-param="time" data-min="0" data-max="1" data-value="0.5">
        <svg class="knob-svg" viewBox="0 0 72 72">
          <path class="knob-track" d="M 16,56 A 30,30 0 1,1 56,56" />
          <path class="knob-fill" d="M 16,56 A 30,30 0 1,1 56,56" />
          <circle class="knob-dot" cx="36" cy="8" r="2.5" />
        </svg>
      </div>
      <span class="knob-value">1/4</span>
    </div>

    <!-- FEEDBACK -->
    <div class="knob-group">
      <span class="knob-label">Feedback</span>
      <div class="knob-container" data-param="feedback" data-min="0" data-max="100" data-value="0.4">
        <svg class="knob-svg" viewBox="0 0 72 72">
          <path class="knob-track" d="M 16,56 A 30,30 0 1,1 56,56" />
          <path class="knob-fill" d="M 16,56 A 30,30 0 1,1 56,56" />
          <circle class="knob-dot" cx="36" cy="8" r="2.5" />
        </svg>
      </div>
      <span class="knob-value">40%</span>
    </div>

    <!-- MIX -->
    <div class="knob-group">
      <span class="knob-label">Mix</span>
      <div class="knob-container" data-param="mix" data-min="0" data-max="100" data-value="0.3">
        <svg class="knob-svg" viewBox="0 0 72 72">
          <path class="knob-track" d="M 16,56 A 30,30 0 1,1 56,56" />
          <path class="knob-fill" d="M 16,56 A 30,30 0 1,1 56,56" />
          <circle class="knob-dot" cx="36" cy="8" r="2.5" />
        </svg>
      </div>
      <span class="knob-value">30%</span>
    </div>

  </div>

  <!-- Tempo Sync -->
  <div class="sync-section">
    <span class="sync-label">Sync</span>
    <div class="sync-options">
      <button class="sync-btn" data-div="1/16">1/16</button>
      <button class="sync-btn" data-div="1/8">1/8</button>
      <button class="sync-btn active" data-div="1/4">1/4</button>
      <button class="sync-btn" data-div="1/2">1/2</button>
      <button class="sync-btn" data-div="1/1">1/1</button>
    </div>
  </div>

</div>

<script>
(function() {

  // Arc geometry constants
  const ARC_START_ANGLE = 135;
  const ARC_END_ANGLE = 405;
  const ARC_RANGE = ARC_END_ANGLE - ARC_START_ANGLE; // 270 degrees
  const CX = 36, CY = 36, R = 30;

  // Calculate total arc length
  function arcPath(startDeg, endDeg) {
    const s = (startDeg * Math.PI) / 180;
    const e = (endDeg * Math.PI) / 180;
    const x1 = CX + R * Math.cos(s), y1 = CY + R * Math.sin(s);
    const x2 = CX + R * Math.cos(e), y2 = CY + R * Math.sin(e);
    const sweep = endDeg - startDeg;
    const large = sweep > 180 ? 1 : 0;
    return `M ${x1},${y1} A ${R},${R} 0 ${large},1 ${x2},${y2}`;
  }

  const TOTAL_ARC_LENGTH = Math.PI * 2 * R * (ARC_RANGE / 360);

  const syncValues = ['1/16', '1/8', '1/4', '1/2', '1/1'];
  let currentSync = 2; // index into syncValues, default 1/4

  // Time knob maps to sync index
  const timeSteps = syncValues.length;

  function updateKnob(container) {
    const param = container.dataset.param;
    const val = parseFloat(container.dataset.value);
    const fill = container.querySelector('.knob-fill');
    const dot = container.querySelector('.knob-dot');
    const valueDisplay = container.closest('.knob-group').querySelector('.knob-value');

    // Arc fill
    const fraction = val;
    const arcLen = TOTAL_ARC_LENGTH * fraction;
    const trackPath = arcPath(ARC_START_ANGLE, ARC_END_ANGLE);
    fill.setAttribute('d', trackPath);
    fill.style.strokeDasharray = `${TOTAL_ARC_LENGTH}`;
    fill.style.strokeDashoffset = `${TOTAL_ARC_LENGTH - arcLen}`;

    // Dot position
    const angle = ARC_START_ANGLE + ARC_RANGE * fraction;
    const rad = (angle * Math.PI) / 180;
    const dx = CX + R * Math.cos(rad);
    const dy = CY + R * Math.sin(rad);
    dot.setAttribute('cx', dx);
    dot.setAttribute('cy', dy);

    // Value display
    if (param === 'time') {
      const idx = Math.round(val * (timeSteps - 1));
      currentSync = idx;
      valueDisplay.textContent = syncValues[idx];
      // Update sync buttons
      document.querySelectorAll('.sync-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });
    } else if (param === 'feedback') {
      valueDisplay.textContent = Math.round(val * 100) + '%';
    } else if (param === 'mix') {
      valueDisplay.textContent = Math.round(val * 100) + '%';
    }
  }

  // Initialize all knobs
  const knobs = document.querySelectorAll('.knob-container');
  knobs.forEach(k => updateKnob(k));

  // Drag interaction
  let activeKnob = null;
  let startY = 0;
  let startVal = 0;

  function onPointerDown(e) {
    activeKnob = e.currentTarget;
    startY = e.clientY;
    startVal = parseFloat(activeKnob.dataset.value);
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!activeKnob) return;
    const dy = startY - e.clientY;
    const sensitivity = 0.005;
    let newVal = startVal + dy * sensitivity;

    const param = activeKnob.dataset.param;
    if (param === 'time') {
      // Snap to steps
      newVal = Math.max(0, Math.min(1, newVal));
      const idx = Math.round(newVal * (timeSteps - 1));
      newVal = idx / (timeSteps - 1);
    } else {
      newVal = Math.max(0, Math.min(1, newVal));
    }

    activeKnob.dataset.value = newVal;
    updateKnob(activeKnob);
  }

  function onPointerUp() {
    activeKnob = null;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
  }

  knobs.forEach(k => k.addEventListener('pointerdown', onPointerDown));

  // Sync button clicks
  document.querySelectorAll('.sync-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      const timeKnob = document.querySelector('[data-param="time"]');
      const newVal = i / (timeSteps - 1);
      timeKnob.dataset.value = newVal;
      updateKnob(timeKnob);
    });
  });

  // Ping pong animation
  const leftDot = document.querySelector('.dot.left');
  const rightDot = document.querySelector('.dot.right');
  let pingState = true;

  setInterval(() => {
    pingState = !pingState;
    leftDot.style.opacity = pingState ? '1' : '0.25';
    rightDot.style.opacity = pingState ? '0.25' : '1';
    leftDot.style.filter = pingState ? 'drop-shadow(0 0 4px #4a9eff)' : 'none';
    rightDot.style.filter = pingState ? 'none' : 'drop-shadow(0 0 4px #4a9eff)';
  }, 500);

})();
</script>

</body>
</html>

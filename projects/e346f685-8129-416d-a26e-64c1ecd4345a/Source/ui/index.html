<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      width: 500px;
      height: 300px;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #1e2228 0%, #141618 100%);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .plugin-title {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 28px;
      color: #5ec4b6;
      text-shadow: 0 0 15px rgba(94, 196, 182, 0.2);
    }

    .controls {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .knob-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6b7280;
      font-weight: 400;
    }

    .knob-value {
      font-size: 11px;
      color: #5ec4b6;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="plugin-title">PP</div>

  <div class="controls">
    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Delay" min="0" max="1" value="0.367" step="0.01" data-diameter="64">
      <div class="knob-label">Delay</div>
      <span class="knob-value">37%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Feedback" min="0" max="1" value="0.55" step="0.01" data-diameter="64">
      <div class="knob-label">Feedback</div>
      <span class="knob-value">55%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Mix" min="0" max="1" value="0.45" step="0.01" data-diameter="64">
      <div class="knob-label">Mix</div>
      <span class="knob-value">45%</span>
    </div>
  </div>

  <script>
  document.querySelectorAll('.input-knob').forEach(function(knob) {
    var display = knob.closest('.knob-group').querySelector('.knob-value');
    if (display) knob.addEventListener('input', function() {
      display.textContent = Math.round(knob.value * 100) + '%';
    });
  });
  </script>
</body>
</html>

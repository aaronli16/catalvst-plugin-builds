<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RETROVERB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff00e5;
      --neon-purple: #b400ff;
      --dark-bg: #0a0a14;
      --grid-color: rgba(0, 240, 255, 0.06);
      --panel-bg: rgba(12, 12, 28, 0.92);
      --knob-size: 120px;
    }

    body {
      background: var(--dark-bg);
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridScroll {
      0% { transform: perspective(500px) rotateX(30deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(30deg) translateY(40px); }
    }

    /* Glow overlay */
    .glow-overlay {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 50% 80%, rgba(0, 240, 255, 0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 30% 20%, rgba(180, 0, 255, 0.03) 0%, transparent 40%),
                  radial-gradient(ellipse at 70% 30%, rgba(255, 0, 229, 0.03) 0%, transparent 40%);
      z-index: 0;
      pointer-events: none;
    }

    /* Main plugin container */
    .plugin {
      position: relative;
      z-index: 1;
      width: 480px;
      background: var(--panel-bg);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 16px;
      padding: 32px 36px 36px;
      box-shadow:
        0 0 40px rgba(0, 240, 255, 0.06),
        0 0 80px rgba(180, 0, 255, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.3));
    }

    .header .subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255, 0, 229, 0.5);
      margin-top: 6px;
    }

    .header-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent);
      margin-top: 18px;
      opacity: 0.4;
    }

    /* Main knob section */
    .main-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .knob-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(0, 240, 255, 0.6);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .knob-container {
      position: relative;
      width: var(--knob-size);
      height: var(--knob-size);
      cursor: grab;
    }

    .knob-container:active {
      cursor: grabbing;
    }

    /* SVG ring behind knob */
    .knob-ring {
      position: absolute;
      top: -10px;
      left: -10px;
      width: calc(var(--knob-size) + 20px);
      height: calc(var(--knob-size) + 20px);
    }

    .knob-ring .track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.06);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .knob-ring .value {
      fill: none;
      stroke: url(#knobGradient);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s ease;
      filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.5));
    }

    .knob-body {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--knob-size);
      height: var(--knob-size);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #1e1e30, #0c0c18);
      border: 2px solid rgba(0, 240, 255, 0.12);
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 20px rgba(0, 240, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .knob-indicator {
      position: absolute;
      width: 2px;
      height: 20px;
      background: linear-gradient(to top, var(--neon-cyan), transparent);
      top: 10px;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%);
      border-radius: 1px;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
    }

    .knob-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--neon-cyan);
      text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
      pointer-events: none;
      user-select: none;
    }

    .knob-value-suffix {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.5;
    }

    /* Vocoder / Chorus balance section */
    .blend-section {
      margin-bottom: 28px;
    }

    .blend-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .blend-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .blend-label.left {
      color: rgba(180, 0, 255, 0.6);
    }

    .blend-label.right {
      color: rgba(255, 0, 229, 0.6);
    }

    .slider-track {
      position: relative;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      cursor: pointer;
      overflow: visible;
    }

    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-magenta));
      pointer-events: none;
      box-shadow: 0 0 10px rgba(180, 0, 255, 0.3);
    }

    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a2a40, #14141e);
      border: 2px solid rgba(255, 0, 229, 0.5);
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 12px rgba(255, 0, 229, 0.3), 0 2px 8px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    .slider-thumb:active {
      cursor: grabbing;
    }

    .slider-center-mark {
      position: absolute;
      top: -4px;
      left: 50%;
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* Wet/Dry section */
    .wetdry-section {
      margin-bottom: 8px;
    }

    .wetdry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .wetdry-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0, 240, 255, 0.5);
    }

    .wetdry-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
    }

    .wetdry-track {
      position: relative;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      cursor: pointer;
      overflow: visible;
    }

    .wetdry-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.3), var(--neon-cyan));
      pointer-events: none;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
    }

    .wetdry-thumb {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a2a40, #14141e);
      border: 2px solid rgba(0, 240, 255, 0.5);
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2), 0 2px 6px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    .wetdry-thumb:active {
      cursor: grabbing;
    }

    /* Visualizer */
    .visualizer {
      width: 100%;
      height: 60px;
      margin-bottom: 24px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 240, 255, 0.06);
      overflow: hidden;
      position: relative;
    }

    .visualizer canvas {
      width: 100%;
      height: 100%;
    }

    .visualizer-label {
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 7px;
      letter-spacing: 2px;
      color: rgba(0, 240, 255, 0.2);
      text-transform: uppercase;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 8px;
    }

    .footer span {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.15);
      text-transform: uppercase;
    }

    /* Neon pulse animation on active controls */
    @keyframes neonPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Scanline effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow-overlay"></div>
  <div class="scanlines"></div>

  <div class="plugin">
    <!-- Header -->
    <div class="header">
      <h1>RETROVERB</h1>
      <div class="subtitle">Vocoder &times; Chorus</div>
      <div class="header-line"></div>
    </div>

    <!-- Waveform Visualizer -->
    <div class="visualizer">
      <canvas id="vizCanvas"></canvas>
      <span class="visualizer-label">Signal</span>
    </div>

    <!-- Main Robot Amount Knob -->
    <div class="main-control">
      <div class="knob-label">Robot Amount</div>
      <div class="knob-container" id="mainKnob" data-param="robotAmount" data-value="0.5">
        <svg class="knob-ring" viewBox="0 0 140 140">
          <defs>
            <linearGradient id="knobGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f0ff" />
              <stop offset="100%" stop-color="#ff00e5" />
            </linearGradient>
          </defs>
          <circle class="track" cx="70" cy="70" r="62"
            stroke-dasharray="292.17"
            stroke-dashoffset="-48.69"
            transform="rotate(135 70 70)" />
          <circle class="value" cx="70" cy="70" r="62"
            stroke-dasharray="292.17"
            stroke-dashoffset="292.17"
            transform="rotate(135 70 70)" />
        </svg>
        <div class="knob-body">
          <div class="knob-indicator"></div>
          <span class="knob-value">50<span class="knob-value-suffix">%</span></span>
        </div>
      </div>
    </div>

    <!-- Vocoder / Chorus Blend Slider -->
    <div class="blend-section">
      <div class="blend-header">
        <span class="blend-label left">Vocoder</span>
        <span class="blend-label right">Chorus</span>
      </div>
      <div class="slider-track" id="blendSlider" data-param="blend" data-value="0.5">
        <div class="slider-center-mark"></div>
        <div class="slider-fill" style="width: 50%;"></div>
        <div class="slider-thumb" style="left: 50%;"></div>
      </div>
    </div>

    <!-- Wet/Dry Slider -->
    <div class="wetdry-section">
      <div class="wetdry-header">
        <span class="wetdry-label">Wet / Dry</span>
        <span class="wetdry-value" id="wetdryDisplay">75%</span>
      </div>
      <div class="wetdry-track" id="wetdrySlider" data-param="wetDry" data-value="0.75">
        <div class="wetdry-fill" style="width: 75%;"></div>
        <div class="wetdry-thumb" style="left: 75%;"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>RETROVERB v1.0</span>
    </div>
  </div>

  <script>
    // ========================================
    // Parameter state
    // ========================================
    const params = {
      robotAmount: 0.5,
      blend: 0.5,
      wetDry: 0.75
    };

    // ========================================
    // Knob interaction
    // ========================================
    function initKnob(knobEl) {
      const paramName = knobEl.dataset.param;
      const valueArc = knobEl.querySelector('.knob-ring .value');
      const indicator = knobEl.querySelector('.knob-indicator');
      const valueDisplay = knobEl.querySelector('.knob-value');
      const arcLength = 243.48; // 270 degrees worth of circumference (r=62, 270/360 * 2*PI*62)
      const totalDash = 292.17;

      let dragging = false;
      let startY = 0;
      let startValue = 0;

      function updateVisuals(val) {
        const offset = totalDash - (val * arcLength);
        valueArc.style.strokeDashoffset = offset;

        const angle = -135 + (val * 270);
        indicator.style.transform = `translateX(-50%) rotate(${angle}deg)`;

        valueDisplay.innerHTML = `${Math.round(val * 100)}<span class="knob-value-suffix">%</span>`;
      }

      function onPointerDown(e) {
        dragging = true;
        startY = e.clientY;
        startValue = params[paramName];
        document.body.style.cursor = 'grabbing';
        e.preventDefault();
      }

      function onPointerMove(e) {
        if (!dragging) return;
        const delta = (startY - e.clientY) / 200;
        let newVal = Math.max(0, Math.min(1, startValue + delta));
        params[paramName] = newVal;
        knobEl.dataset.value = newVal;
        updateVisuals(newVal);
        sendParam(paramName, newVal);
      }

      function onPointerUp() {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = '';
      }

      knobEl.addEventListener('pointerdown', onPointerDown);
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);

      // Double-click to reset
      knobEl.addEventListener('dblclick', () => {
        params[paramName] = 0.5;
        knobEl.dataset.value = 0.5;
        updateVisuals(0.5);
        sendParam(paramName, 0.5);
      });

      updateVisuals(params[paramName]);
    }

    // ========================================
    // Slider interaction (blend & wetdry)
    // ========================================
    function initSlider(trackEl, options = {}) {
      const paramName = trackEl.dataset.param;
      const fill = trackEl.querySelector(options.fillClass || '.slider-fill, .wetdry-fill');
      const thumb = trackEl.querySelector(options.thumbClass || '.slider-thumb, .wetdry-thumb');
      const displayEl = options.displayEl || null;

      let dragging = false;

      function updateVisuals(val) {
        const pct = val * 100;
        fill.style.width = pct + '%';
        thumb.style.left = pct + '%';
        if (displayEl) {
          displayEl.textContent = Math.round(pct) + '%';
        }
      }

      function getValueFromEvent(e) {
        const rect = trackEl.getBoundingClientRect();
        const x = e.clientX - rect.left;
        return Math.max(0, Math.min(1, x / rect.width));
      }

      function onPointerDown(e) {
        dragging = true;
        const val = getValueFromEvent(e);
        params[paramName] = val;
        trackEl.dataset.value = val;
        updateVisuals(val);
        sendParam(paramName, val);
        e.preventDefault();
      }

      function onPointerMove(e) {
        if (!dragging) return;
        const val = getValueFromEvent(e);
        params[paramName] = val;
        trackEl.dataset.value = val;
        updateVisuals(val);
        sendParam(paramName, val);
      }

      function onPointerUp() {
        dragging = false;
      }

      trackEl.addEventListener('pointerdown', onPointerDown);
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);

      // Double-click to center
      trackEl.addEventListener('dblclick', () => {
        const defaultVal = paramName === 'wetDry' ? 0.75 : 0.5;
        params[paramName] = defaultVal;
        trackEl.dataset.value = defaultVal;
        updateVisuals(defaultVal);
        sendParam(paramName, defaultVal);
      });

      updateVisuals(params[paramName]);
    }

    // ========================================
    // DAW communication
    // ========================================
    function sendParam(name, value) {
      try {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.juce) {
          window.webkit.messageHandlers.juce.postMessage({ type: 'parameterChange', name: name, value: value });
        }
      } catch (e) {
        // Silently fail outside DAW context
      }
    }

    // ========================================
    // Waveform visualizer
    // ========================================
    function initVisualizer() {
      const canvas = document.getElementById('vizCanvas');
      const ctx = canvas.getContext('2d');
      let animFrame;

      function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * 2;
        canvas.height = rect.height * 2;
        ctx.scale(2, 2);
      }

      resize();
      window.addEventListener('resize', resize);

      let phase = 0;

      function draw() {
        const w = canvas.width / 2;
        const h = canvas.height / 2;
        ctx.clearRect(0, 0, w, h);

        const robot = params.robotAmount;
        const blend = params.blend;
        const midY = h / 2;

        // Draw waveform
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0, 240, 255, ${0.3 + robot * 0.4})`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(0, 240, 255, 0.4)';
        ctx.shadowBlur = 8;

        for (let x = 0; x < w; x++) {
          const t = x / w;

          // Mix of smooth sine and stepped/quantized wave based on robot amount
          let smooth = Math.sin(t * Math.PI * 6 + phase) * 0.6;
          smooth += Math.sin(t * Math.PI * 3.5 + phase * 0.7) * 0.3;

          // Chorus shimmer
          let chorus = Math.sin(t * Math.PI * 8 + phase * 1.3) * 0.15 * blend;

          // Vocoder stepping
          let stepped = smooth;
          if (robot > 0.1) {
            const steps = Math.floor(4 + (1 - robot) * 20);
            stepped = Math.round(smooth * steps) / steps;
          }

          let y = midY + (stepped + chorus) * (midY * 0.7);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Secondary ghost line
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255, 0, 229, ${0.1 + robot * 0.15})`;
        ctx.lineWidth = 1;

        for (let x = 0; x < w; x++) {
          const t = x / w;
          let smooth = Math.sin(t * Math.PI * 6 + phase + 0.3) * 0.5;
          smooth += Math.sin(t * Math.PI * 4 + phase * 0.5) * 0.25;
          let y = midY + smooth * (midY * 0.6);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();

        phase += 0.025;
        animFrame = requestAnimationFrame(draw);
      }

      draw();
    }

    // ========================================
    // Init
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      initKnob(document.getElementById('mainKnob'));

      initSlider(document.getElementById('blendSlider'));

      initSlider(document.getElementById('wetdrySlider'), {
        displayEl: document.getElementById('wetdryDisplay')
      });

      initVisualizer();
    });
  </script>
</body>
</html>

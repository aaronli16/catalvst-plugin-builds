<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Noise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plugin-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .knob {
            width: 120px;
            height: 120px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .knob-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-135deg);
        }

        .knob-track {
            fill: none;
            stroke: #e0e0e0;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .knob-fill {
            fill: none;
            stroke: #000000;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dasharray 0.05s ease-out;
        }

        .knob-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #000000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .knob-indicator {
            position: absolute;
            width: 3px;
            height: 30px;
            background: #ffffff;
            border-radius: 2px;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: center 40px;
        }

        .knob-label {
            font-size: 14px;
            font-weight: 500;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .knob-value {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            margin-top: 8px;
        }

        .title {
            position: absolute;
            top: 30px;
            font-size: 18px;
            font-weight: 300;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="title">White Noise</div>
        
        <div class="knob-container">
            <div class="knob" id="wetKnob">
                <svg class="knob-svg" viewBox="0 0 120 120">
                    <circle class="knob-track" cx="60" cy="60" r="52" />
                    <circle class="knob-fill" cx="60" cy="60" r="52" 
                            stroke-dasharray="0 327" />
                </svg>
                <div class="knob-center">
                    <div class="knob-indicator"></div>
                </div>
            </div>
            <div class="knob-label">Wet</div>
            <div class="knob-value" id="wetValue">50%</div>
        </div>
    </div>

    <script>
        class Knob {
            constructor(element, paramId, min = 0, max = 100, defaultValue = 50) {
                this.element = element;
                this.paramId = paramId;
                this.min = min;
                this.max = max;
                this.value = defaultValue;
                this.isDragging = false;
                this.startY = 0;
                this.startValue = 0;
                
                this.indicator = element.querySelector('.knob-indicator');
                this.fill = element.querySelector('.knob-fill');
                this.valueDisplay = document.getElementById(paramId + 'Value');
                
                this.circumference = 2 * Math.PI * 52;
                this.arcLength = (270 / 360) * this.circumference;
                
                this.init();
                this.updateVisuals();
            }
            
            init() {
                this.element.addEventListener('mousedown', this.onMouseDown.bind(this));
                document.addEventListener('mousemove', this.onMouseMove.bind(this));
                document.addEventListener('mouseup', this.onMouseUp.bind(this));
                
                this.element.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: false });
                document.addEventListener('touchmove', this.onTouchMove.bind(this), { passive: false });
                document.addEventListener('touchend', this.onTouchEnd.bind(this));
                
                this.element.addEventListener('dblclick', this.onDoubleClick.bind(this));
            }
            
            onMouseDown(e) {
                e.preventDefault();
                this.isDragging = true;
                this.startY = e.clientY;
                this.startValue = this.value;
                this.element.style.cursor = 'grabbing';
            }
            
            onMouseMove(e) {
                if (!this.isDragging) return;
                
                const deltaY = this.startY - e.clientY;
                const range = this.max - this.min;
                const sensitivity = 0.5;
                const change = (deltaY * sensitivity);
                
                this.value = Math.max(this.min, Math.min(this.max, this.startValue + change));
                this.updateVisuals();
                this.sendToPlugin();
            }
            
            onMouseUp() {
                if (this.isDragging) {
                    this.isDragging = false;
                    this.element.style.cursor = 'pointer';
                }
            }
            
            onTouchStart(e) {
                e.preventDefault();
                this.isDragging = true;
                this.startY = e.touches[0].clientY;
                this.startValue = this.value;
            }
            
            onTouchMove(e) {
                if (!this.isDragging) return;
                e.preventDefault();
                
                const deltaY = this.startY - e.touches[0].clientY;
                const range = this.max - this.min;
                const sensitivity = 0.5;
                const change = (deltaY * sensitivity);
                
                this.value = Math.max(this.min, Math.min(this.max, this.startValue + change));
                this.updateVisuals();
                this.sendToPlugin();
            }
            
            onTouchEnd() {
                this.isDragging = false;
            }
            
            onDoubleClick() {
                this.value = (this.min + this.max) / 2;
                this.updateVisuals();
                this.sendToPlugin();
            }
            
            updateVisuals() {
                const normalized = (this.value - this.min) / (this.max - this.min);
                
                // Update indicator rotation (-135deg to +135deg = 270deg total)
                const rotation = -135 + (normalized * 270);
                this.indicator.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
                
                // Update arc fill
                const fillLength = normalized * this.arcLength;
                this.fill.setAttribute('stroke-dasharray', `${fillLength} ${this.circumference}`);
                
                // Update value display
                this.valueDisplay.textContent = Math.round(this.value) + '%';
            }
            
            setValue(value) {
                this.value = Math.max(this.min, Math.min(this.max, value));
                this.updateVisuals();
            }
            
            sendToPlugin() {
                // Normalize to 0-1 range for plugin
                const normalizedValue = (this.value - this.min) / (this.max - this.min);
                
                if (window.PluginUI) {
                    window.PluginUI.setParameter(this.paramId, normalizedValue);
                }
            }
        }
        
        // Initialize knob
        const wetKnob = new Knob(
            document.getElementById('wetKnob'),
            'wet',
            0,
            100,
            50
        );
        
        // Plugin communication interface
        window.PluginUI = window.PluginUI || {
            setParameter: function(paramId, value) {
                console.log(`Parameter ${paramId} set to ${value}`);
            }
        };
        
        // Receive parameter updates from plugin
        window.updateParameter = function(paramId, value) {
            if (paramId === 'wet') {
                wetKnob.setValue(value * 100);
            }
        };
    </script>
</body>
</html>

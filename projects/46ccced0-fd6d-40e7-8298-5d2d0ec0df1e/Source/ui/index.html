<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearth 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 600px;
            height: 400px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .plugin-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
        }

        .header {
            margin-bottom: 40px;
        }

        .plugin-title {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #e0e0e0;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 32px;
            align-items: center;
            justify-content: center;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .knob {
            width: 80px;
            height: 80px;
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            position: relative;
        }

        .knob-visual {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
            box-shadow: 
                -6px -6px 12px rgba(60, 60, 60, 0.3),
                6px 6px 12px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .knob-indicator {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 24px;
            background: #e0e0e0;
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(224, 224, 224, 0.4);
        }

        .knob-label {
            font-size: 13px;
            font-weight: 400;
            color: #b0b0b0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .knob-value {
            font-size: 11px;
            color: #808080;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="header">
            <h1 class="plugin-title">Hearth 2</h1>
        </div>
        
        <div class="controls">
            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" 
                           class="knob" 
                           data-param="Decay Rate" 
                           min="0" 
                           max="1" 
                           value="0.7" 
                           step="0.01">
                    <div class="knob-visual">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">Decay</div>
                <div class="knob-value">70%</div>
            </div>

            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" 
                           class="knob" 
                           data-param="Damping" 
                           min="0" 
                           max="1" 
                           value="0.7" 
                           step="0.01">
                    <div class="knob-visual">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">Damping</div>
                <div class="knob-value">70%</div>
            </div>

            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" 
                           class="knob" 
                           data-param="Dry/Wet Mix" 
                           min="0" 
                           max="1" 
                           value="0.35" 
                           step="0.01">
                    <div class="knob-visual">
                        <div class="knob-indicator"></div>
                    </div>
                </div>
                <div class="knob-label">Mix</div>
                <div class="knob-value">35%</div>
            </div>
        </div>
    </div>

    <script>
        // Knob rotation and value display
        document.querySelectorAll('.knob').forEach(knob => {
            const container = knob.closest('.knob-container');
            const indicator = container.querySelector('.knob-indicator');
            const valueDisplay = container.querySelector('.knob-value');
            
            function updateKnob() {
                const value = parseFloat(knob.value);
                const percent = Math.round(value * 100);
                
                // Rotate indicator: 0 = -135deg, 1 = +135deg
                const rotation = -135 + (value * 270);
                indicator.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
                indicator.style.transformOrigin = 'center bottom';
                
                // Update value display
                valueDisplay.textContent = `${percent}%`;
            }
            
            knob.addEventListener('input', updateKnob);
            updateKnob(); // Initialize
        });
    </script>
</body>
</html>

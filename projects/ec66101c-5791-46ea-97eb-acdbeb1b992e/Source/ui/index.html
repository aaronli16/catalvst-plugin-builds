<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 600px;
            height: 400px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .plugin-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .header {
            margin-bottom: 40px;
        }

        .plugin-title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .knob {
            width: 80px;
            height: 80px;
            appearance: none;
            background: none;
            cursor: pointer;
            position: relative;
        }

        .knob-visual {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a3e, #1f1f2e);
            box-shadow: 
                inset 2px 2px 5px rgba(0, 0, 0, 0.5),
                inset -2px -2px 5px rgba(255, 255, 255, 0.05),
                3px 3px 10px rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            transition: box-shadow 0.2s ease;
        }

        .knob-wrapper:hover .knob-visual {
            box-shadow: 
                inset 2px 2px 5px rgba(0, 0, 0, 0.5),
                inset -2px -2px 5px rgba(255, 255, 255, 0.08),
                3px 3px 12px rgba(0, 0, 0, 0.4);
        }

        .knob-indicator {
            width: 3px;
            height: 28px;
            background: linear-gradient(to bottom, #4a9eff, #2d7dd2);
            position: absolute;
            top: 10px;
            left: 50%;
            transform-origin: center 30px;
            transform: translateX(-50%) rotate(0deg);
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(74, 158, 255, 0.6);
        }

        .knob-label {
            font-size: 13px;
            font-weight: 500;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .knob-value {
            font-size: 11px;
            color: #808080;
            font-weight: 400;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0;
            height: 0;
        }

        input[type="range"]::-moz-range-thumb {
            width: 0;
            height: 0;
            border: none;
            background: transparent;
        }

        input[type="range"]:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="plugin-container">
        <div class="header">
            <h1 class="plugin-title">Sentient</h1>
        </div>
        
        <div class="controls">
            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="decay" data-param="Decay Rate" min="0" max="1" value="0.7" step="0.01">
                    <div class="knob-visual"></div>
                    <div class="knob-indicator" id="decay-indicator"></div>
                </div>
                <span class="knob-label">Decay</span>
                <span class="knob-value" id="decay-value">70%</span>
            </div>

            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="damping" data-param="Damping" min="0" max="1" value="0.625" step="0.01">
                    <div class="knob-visual"></div>
                    <div class="knob-indicator" id="damping-indicator"></div>
                </div>
                <span class="knob-label">Damping</span>
                <span class="knob-value" id="damping-value">63%</span>
            </div>

            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="mix" data-param="Dry/Wet Mix" min="0" max="1" value="0.5" step="0.01">
                    <div class="knob-visual"></div>
                    <div class="knob-indicator" id="mix-indicator"></div>
                </div>
                <span class="knob-label">Mix</span>
                <span class="knob-value" id="mix-value">50%</span>
            </div>
        </div>
    </div>

    <script>
        // Knob rotation and value display
        const knobs = [
            { input: 'decay', indicator: 'decay-indicator', value: 'decay-value' },
            { input: 'damping', indicator: 'damping-indicator', value: 'damping-value' },
            { input: 'mix', indicator: 'mix-indicator', value: 'mix-value' }
        ];

        knobs.forEach(knob => {
            const input = document.getElementById(knob.input);
            const indicator = document.getElementById(knob.indicator);
            const valueDisplay = document.getElementById(knob.value);

            function updateKnob() {
                const value = parseFloat(input.value);
                const percentage = Math.round(value * 100);
                const rotation = -135 + (value * 270); // -135° to +135°
                
                indicator.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
                valueDisplay.textContent = `${percentage}%`;
            }

            input.addEventListener('input', updateKnob);
            updateKnob(); // Initialize
        });
    </script>
</body>
</html>

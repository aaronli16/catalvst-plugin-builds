<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amber 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 600px;
            height: 400px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .header {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 28px;
            font-weight: 300;
            color: #2a2a2a;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .knobs-container {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            gap: 40px;
        }

        .knob-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .knob {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #2a2a2a;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.2s ease;
        }

        .knob:hover {
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .knob::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 28px;
            background: #2a2a2a;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .knob-label {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">AMBER 2</div>
        <div class="knobs-container">
            <div class="knob-wrapper">
                <div class="knob" data-knob="decay"></div>
                <div class="knob-label">Decay</div>
                <input type="range" class="knob-input" data-param="Decay Rate" min="0" max="1" value="0.7" step="0.001">
            </div>
            <div class="knob-wrapper">
                <div class="knob" data-knob="damping"></div>
                <div class="knob-label">Damping</div>
                <input type="range" class="knob-input" data-param="Damping" min="0" max="1" value="0.7" step="0.001">
            </div>
            <div class="knob-wrapper">
                <div class="knob" data-knob="mix"></div>
                <div class="knob-label">Mix</div>
                <input type="range" class="knob-input" data-param="Dry/Wet Mix" min="0" max="1" value="0.35" step="0.001">
            </div>
        </div>
    </div>

    <script>
        // Knob rotation logic
        const knobs = document.querySelectorAll('.knob');
        
        knobs.forEach(knob => {
            const knobType = knob.getAttribute('data-knob');
            const input = document.querySelector(`input[data-param*="${knobType === 'decay' ? 'Decay' : knobType === 'damping' ? 'Damping' : 'Mix'}"]`);
            
            let isDragging = false;
            let startY = 0;
            let startValue = 0;

            function updateKnobRotation() {
                const value = parseFloat(input.value);
                const rotation = (value * 270) - 135; // -135° to +135°
                knob.style.transform = `rotate(${rotation}deg)`;
            }

            knob.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.clientY;
                startValue = parseFloat(input.value);
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaY = startY - e.clientY;
                const sensitivity = 0.005;
                let newValue = startValue + (deltaY * sensitivity);
                newValue = Math.max(0, Math.min(1, newValue));
                
                input.value = newValue;
                input.dispatchEvent(new Event('input', { bubbles: true }));
                updateKnobRotation();
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // Initialize rotation
            updateKnobRotation();
            
            // Update rotation when input changes (for automation/preset recall)
            input.addEventListener('input', updateKnobRotation);
        });
    </script>
</body>
</html>

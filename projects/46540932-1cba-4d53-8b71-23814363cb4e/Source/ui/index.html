<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIFT — Analog Lead Synth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --bg: #0e0e10;
      --surface: #1a1a1e;
      --accent: #d4a054;
      --accent-glow: rgba(212, 160, 84, 0.25);
      --text: #e8e4de;
      --text-dim: #6b6862;
      --ring-track: #2a2a2e;
    }

    body {
      font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .plugin {
      width: 400px;
      height: 520px;
      background: var(--surface);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 36px 32px 32px;
      box-shadow:
        0 2px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text);
    }

    .header .subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* Knob Area */
    .knob-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .knob-container {
      position: relative;
      width: 180px;
      height: 180px;
      cursor: grab;
    }

    .knob-container:active {
      cursor: grabbing;
    }

    .knob-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px var(--accent-glow));
      transition: filter 0.3s ease;
    }

    .knob-container:hover .knob-svg {
      filter: drop-shadow(0 0 30px var(--accent-glow));
    }

    .knob-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 5;
      stroke-linecap: round;
    }

    .knob-value {
      fill: none;
      stroke: var(--accent);
      stroke-width: 5;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s ease;
    }

    .knob-dot {
      fill: var(--accent);
      transition: cx 0.05s ease, cy 0.05s ease;
    }

    .knob-center {
      fill: var(--surface);
      stroke: var(--ring-track);
      stroke-width: 1;
    }

    .knob-label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    .knob-readout {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      text-align: center;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      letter-spacing: 1px;
    }

    /* Warmth Toggle */
    .warmth-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .warmth-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .warmth-toggle {
      width: 48px;
      height: 26px;
      background: var(--ring-track);
      border-radius: 13px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s ease;
    }

    .warmth-toggle.active {
      background: var(--accent);
    }

    .warmth-toggle .thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: var(--text);
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .warmth-toggle.active .thumb {
      transform: translateX(22px);
    }

    /* Footer */
    .footer {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="plugin">
    <div class="header">
      <h1>Drift</h1>
      <p class="subtitle">Analog Lead</p>
    </div>

    <div class="knob-section">
      <div class="knob-container" id="detuneKnob">
        <svg class="knob-svg" viewBox="0 0 180 180">
          <!-- Track arc -->
          <path class="knob-track" id="knobTrack" />
          <!-- Value arc -->
          <path class="knob-value" id="knobValue" />
          <!-- Center circle -->
          <circle class="knob-center" cx="90" cy="90" r="50" />
          <!-- Indicator dot -->
          <circle class="knob-dot" id="knobDot" r="5" />
        </svg>
      </div>
      <div class="knob-readout" id="readout">0%</div>
      <div class="knob-label">Detune</div>
    </div>

    <div class="warmth-section">
      <div class="warmth-toggle" id="warmthToggle">
        <div class="thumb"></div>
      </div>
      <div class="warmth-label">Warmth</div>
    </div>

    <div class="footer">v1.0</div>
  </div>

  <script>
    // --- Arc math helpers ---
    const ARC_START = 225;  // degrees, bottom-left
    const ARC_END = -45;    // degrees, bottom-right (clockwise)
    const ARC_RANGE = 270;  // total sweep
    const RADIUS = 78;
    const CX = 90, CY = 90;

    function degToRad(deg) {
      return (deg * Math.PI) / 180;
    }

    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = degToRad(angleDeg);
      return {
        x: cx + r * Math.cos(rad),
        y: cy - r * Math.sin(rad),
      };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, startAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);
      const sweep = startAngle - endAngle;
      const largeArc = sweep > 180 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
    }

    // --- State ---
    let detuneValue = 0; // 0 to 1
    let warmthOn = true;

    // --- Knob rendering ---
    const knobTrack = document.getElementById('knobTrack');
    const knobValue = document.getElementById('knobValue');
    const knobDot = document.getElementById('knobDot');
    const readout = document.getElementById('readout');
    const knobContainer = document.getElementById('detuneKnob');

    function renderKnob(value) {
      // Full track arc
      knobTrack.setAttribute('d', describeArc(CX, CY, RADIUS, ARC_START, ARC_END));

      // Value arc
      const endAngle = ARC_START - value * ARC_RANGE;
      if (value > 0.005) {
        knobValue.setAttribute('d', describeArc(CX, CY, RADIUS, ARC_START, endAngle));
        knobValue.style.display = '';
      } else {
        knobValue.style.display = 'none';
      }

      // Dot position
      const dotPos = polarToCartesian(CX, CY, RADIUS, endAngle);
      knobDot.setAttribute('cx', dotPos.x);
      knobDot.setAttribute('cy', dotPos.y);

      // Readout — show as percentage
      const pct = Math.round(value * 100);
      readout.textContent = pct + '%';

      // Send to DAW
      try {
        if (window.sendParameterChange) {
          window.sendParameterChange('detune', value);
        }
      } catch (e) {}
    }

    // --- Knob interaction ---
    let dragging = false;
    let dragStartY = 0;
    let dragStartValue = 0;

    knobContainer.addEventListener('mousedown', (e) => {
      dragging = true;
      dragStartY = e.clientY;
      dragStartValue = detuneValue;
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dy = dragStartY - e.clientY;
      const sensitivity = e.shiftKey ? 0.001 : 0.004;
      detuneValue = Math.min(1, Math.max(0, dragStartValue + dy * sensitivity));
      renderKnob(detuneValue);
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
    });

    // Double-click to reset
    knobContainer.addEventListener('dblclick', () => {
      detuneValue = 0;
      renderKnob(detuneValue);
    });

    // --- Warmth toggle ---
    const warmthToggle = document.getElementById('warmthToggle');
    warmthToggle.classList.add('active');

    warmthToggle.addEventListener('click', () => {
      warmthOn = !warmthOn;
      warmthToggle.classList.toggle('active', warmthOn);
      try {
        if (window.sendParameterChange) {
          window.sendParameterChange('warmth', warmthOn ? 1 : 0);
        }
      } catch (e) {}
    });

    // --- Initial render ---
    renderKnob(detuneValue);
  </script>
</body>
</html>

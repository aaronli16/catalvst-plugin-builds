<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      width: 600px;
      height: 350px;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 50%, #0a0a0a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .plugin-title {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
      color: #ffffff;
    }

    .controls {
      display: flex;
      gap: 48px;
      align-items: center;
    }

    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .knob-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888888;
      font-weight: 500;
    }

    .knob-value {
      font-size: 12px;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="plugin-title">Warm Plate Reverb</div>

  <div class="controls">
    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Mix" min="0" max="1" value="0.35" step="0.01" data-diameter="64">
      <div class="knob-label">Mix</div>
      <span class="knob-value">35%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Decay" min="0" max="1" value="0.65" step="0.01" data-diameter="64">
      <div class="knob-label">Decay</div>
      <span class="knob-value">65%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Damping" min="0" max="1" value="0.4" step="0.01" data-diameter="64">
      <div class="knob-label">Damping</div>
      <span class="knob-value">40%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Size" min="0" max="1" value="0.1" step="0.01" data-diameter="64">
      <div class="knob-label">Size</div>
      <span class="knob-value">10%</span>
    </div>

    <div class="knob-group">
      <input type="range" class="input-knob" data-param="Bandwidth" min="0" max="1" value="0.6" step="0.01" data-diameter="64">
      <div class="knob-label">Warmth</div>
      <span class="knob-value">60%</span>
    </div>
  </div>

  <script>
  document.querySelectorAll('.input-knob').forEach(function(knob) {
    var display = knob.closest('.knob-group').querySelector('.knob-value');
    if (display) knob.addEventListener('input', function() {
      display.textContent = Math.round(knob.value * 100) + '%';
    });
  });
  </script>
</body>
</html>

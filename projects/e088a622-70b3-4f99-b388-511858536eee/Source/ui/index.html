<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 540px;
    height: 360px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1518;
    font-family: 'Inter', -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .plugin-root {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 28px 32px 24px;
    box-sizing: border-box;
    background: linear-gradient(180deg, #1e181c 0%, #161214 100%);
    border: 1px solid rgba(255, 200, 180, 0.06);
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .plugin-name {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #e8d0c4;
    text-shadow: 0 0 20px rgba(210, 160, 140, 0.15);
  }

  .plugin-type {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(210, 170, 150, 0.35);
  }

  /* Knobs Section */
  .knobs-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 64px;
  }

  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .knob-container {
    position: relative;
    width: 80px;
    height: 80px;
  }

  .knob-svg {
    width: 80px;
    height: 80px;
    transform: rotate(0deg);
  }

  .knob-track {
    fill: none;
    stroke: rgba(210, 170, 150, 0.08);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .knob-arc {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke 0.15s ease;
  }

  .knob-group:nth-child(1) .knob-arc { stroke: #c49882; }
  .knob-group:nth-child(2) .knob-arc { stroke: #b08a9a; }
  .knob-group:nth-child(3) .knob-arc { stroke: #a08878; }

  .knob-indicator {
    transition: stroke 0.15s ease;
  }

  .knob-group:nth-child(1) .knob-indicator { stroke: #d4a890; }
  .knob-group:nth-child(2) .knob-indicator { stroke: #c49aaa; }
  .knob-group:nth-child(3) .knob-indicator { stroke: #b89a88; }

  .knob-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    font-weight: 400;
    color: rgba(232, 210, 200, 0.85);
    pointer-events: none;
  }

  .knob-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(210, 170, 150, 0.4);
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-text {
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(210, 170, 150, 0.15);
  }

  /* Interaction */
  .knob-container { cursor: grab; }
  .knob-container:active { cursor: grabbing; }

  .knob-container:hover .knob-arc {
    filter: brightness(1.2);
  }

  .knob-glow {
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .knob-container:hover .knob-glow {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="plugin-root">

  <!-- Header -->
  <div class="header">
    <div class="plugin-name">Velour</div>
    <div class="plugin-type">Plate Reverb</div>
  </div>

  <!-- Knobs -->
  <div class="knobs-row">

    <!-- Pre-Delay -->
    <div class="knob-group">
      <div class="knob-container" data-param="predelay" data-min="0" data-max="100" data-value="20" data-unit="ms" data-decimals="0">
        <svg class="knob-svg" viewBox="0 0 80 80">
          <defs>
            <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>
          <circle class="knob-track" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="-50.4" transform="rotate(132 40 40)"/>
          <circle class="knob-arc" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="151.2" transform="rotate(132 40 40)"/>
          <circle class="knob-glow" cx="40" cy="40" r="34" fill="none" stroke="rgba(196,152,130,0.08)" stroke-width="8"/>
          <line class="knob-indicator" x1="40" y1="12" x2="40" y2="20" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="knob-value">20ms</div>
      </div>
      <div class="knob-label">Pre-Delay</div>
    </div>

    <!-- Decay -->
    <div class="knob-group">
      <div class="knob-container" data-param="decay" data-min="0.5" data-max="8.0" data-value="3.0" data-unit="s" data-decimals="1">
        <svg class="knob-svg" viewBox="0 0 80 80">
          <circle class="knob-track" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="-50.4" transform="rotate(132 40 40)"/>
          <circle class="knob-arc" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="151.2" transform="rotate(132 40 40)"/>
          <circle class="knob-glow" cx="40" cy="40" r="34" fill="none" stroke="rgba(176,138,154,0.08)" stroke-width="8"/>
          <line class="knob-indicator" x1="40" y1="12" x2="40" y2="20" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="knob-value">3.0s</div>
      </div>
      <div class="knob-label">Decay</div>
    </div>

    <!-- Mix -->
    <div class="knob-group">
      <div class="knob-container" data-param="mix" data-min="0" data-max="100" data-value="35" data-unit="%" data-decimals="0">
        <svg class="knob-svg" viewBox="0 0 80 80">
          <circle class="knob-track" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="-50.4" transform="rotate(132 40 40)"/>
          <circle class="knob-arc" cx="40" cy="40" r="32" stroke-dasharray="151.2" stroke-dashoffset="151.2" transform="rotate(132 40 40)"/>
          <circle class="knob-glow" cx="40" cy="40" r="34" fill="none" stroke="rgba(160,136,120,0.08)" stroke-width="8"/>
          <line class="knob-indicator" x1="40" y1="12" x2="40" y2="20" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="knob-value">35%</div>
      </div>
      <div class="knob-label">Mix</div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">Vintage Plate</div>
  </div>

</div>

<script>
(function() {
  const ARC_TOTAL = 151.2;
  const DEAD_ZONE = 50.4;

  document.querySelectorAll('.knob-container').forEach(knob => {
    const min = parseFloat(knob.dataset.min);
    const max = parseFloat(knob.dataset.max);
    const decimals = parseInt(knob.dataset.decimals);
    const unit = knob.dataset.unit;
    const param = knob.dataset.param;
    let value = parseFloat(knob.dataset.value);

    const arc = knob.querySelector('.knob-arc');
    const indicator = knob.querySelector('.knob-indicator');
    const display = knob.querySelector('.knob-value');

    function normalise(v) {
      return (v - min) / (max - min);
    }

    function render(v) {
      const n = normalise(v);
      const arcLen = ARC_TOTAL * n;
      arc.style.strokeDashoffset = ARC_TOTAL - arcLen;

      // Indicator rotation: 132deg at 0, 408deg at 1 (276deg sweep)
      const angle = 132 + n * 276;
      indicator.setAttribute('transform', `rotate(${angle} 40 40)`);

      const text = v.toFixed(decimals) + unit;
      display.textContent = text;
    }

    render(value);

    let dragging = false;
    let startY = 0;
    let startValue = 0;

    knob.addEventListener('mousedown', e => {
      dragging = true;
      startY = e.clientY;
      startValue = value;
      document.body.style.cursor = 'grabbing';
      e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dy = startY - e.clientY;
      const sensitivity = (max - min) / 200;
      let newValue = startValue + dy * sensitivity;
      newValue = Math.max(min, Math.min(max, newValue));
      value = newValue;
      knob.dataset.value = value;
      render(value);

      // Send to JUCE host
      if (window.juce) {
        const normValue = normalise(value);
        const sliderState = window.juce.sliderStates[param];
        if (sliderState) {
          sliderState.setNormalisedValue(normValue);
        }
      }
    });

    window.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = false;
        document.body.style.cursor = '';
      }
    });

    // Double-click to reset
    knob.addEventListener('dblclick', () => {
      const defaults = { predelay: 20, decay: 3.0, mix: 35 };
      value = defaults[param] || min;
      knob.dataset.value = value;
      render(value);

      if (window.juce) {
        const normValue = normalise(value);
        const sliderState = window.juce.sliderStates[param];
        if (sliderState) {
          sliderState.setNormalisedValue(normValue);
        }
      }
    });

    // Listen for JUCE state changes
    if (window.juce && window.juce.sliderStates[param]) {
      window.juce.sliderStates[param].valueChangedCallback = (newNorm) => {
        value = min + newNorm * (max - min);
        knob.dataset.value = value;
        render(value);
      };
    }
  });
})();
</script>

</body>
</html>

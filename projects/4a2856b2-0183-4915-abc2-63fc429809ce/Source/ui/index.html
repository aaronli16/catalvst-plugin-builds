<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --knob-value: 0;
    --hue-shift: 220;
  }

  body {
    width: 350px;
    height: 500px;
    background: #0e0e12;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    color: #fff;
  }

  /* Background glow that reacts to knob */
  .bg-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 300px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, 
      hsla(calc(220 + var(--knob-value) * 1.4), 80%, 55%, calc(var(--knob-value) / 100 * 0.35)) 0%, 
      transparent 70%);
    pointer-events: none;
    transition: background 0.15s ease;
  }

  /* Title */
  .title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #ffffff90;
    margin-bottom: 40px;
    z-index: 1;
  }

  /* Knob container */
  .knob-area {
    position: relative;
    width: 180px;
    height: 180px;
    z-index: 1;
  }

  /* Outer ring track */
  .knob-track {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .knob-track svg {
    width: 100%;
    height: 100%;
    transform: rotate(135deg);
  }

  .track-bg {
    fill: none;
    stroke: #ffffff10;
    stroke-width: 5;
    stroke-linecap: round;
  }

  .track-fill {
    fill: none;
    stroke: url(#knobGradient);
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.05s ease;
  }

  /* Center knob body */
  .knob-body {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: linear-gradient(145deg, #1e1e28, #16161e);
    box-shadow: 
      0 4px 20px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    cursor: grab;
  }

  .knob-body:active {
    cursor: grabbing;
  }

  /* Knob indicator line */
  .knob-indicator {
    position: absolute;
    top: 12px;
    left: 50%;
    width: 3px;
    height: 18px;
    margin-left: -1.5px;
    border-radius: 2px;
    background: linear-gradient(to bottom, 
      hsl(calc(220 + var(--knob-value) * 1.4), 80%, 65%), 
      hsl(calc(220 + var(--knob-value) * 1.4), 60%, 45%));
    transition: background 0.15s ease;
  }

  .knob-rotation {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }

  /* Value display */
  .value-display {
    margin-top: 30px;
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 2px;
    z-index: 1;
    color: #ffffffcc;
    font-variant-numeric: tabular-nums;
  }

  .value-display span {
    font-size: 14px;
    font-weight: 400;
    color: #ffffff40;
    margin-left: 2px;
  }

  /* Parameter meters */
  .meters {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    z-index: 1;
  }

  .meter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .meter-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff40;
  }

  .meter-bar-outer {
    width: 3px;
    height: 50px;
    background: #ffffff08;
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
  }

  .meter-bar-fill {
    width: 100%;
    border-radius: 2px;
    transition: height 0.12s ease, background 0.15s ease;
  }

  .meter.reverb .meter-bar-fill {
    background: linear-gradient(to top, #6366f1, #818cf8);
  }
  .meter.noise .meter-bar-fill {
    background: linear-gradient(to top, #a78bfa, #c4b5fd);
  }
  .meter.delay .meter-bar-fill {
    background: linear-gradient(to top, #f472b6, #f9a8d4);
  }
  .meter.filter .meter-bar-fill {
    background: linear-gradient(to top, #34d399, #6ee7b7);
  }

</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="title">Rise</div>

<div class="knob-area" id="knobArea">
  <div class="knob-track">
    <svg viewBox="0 0 100 100">
      <defs>
        <linearGradient id="knobGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6366f1" />
          <stop offset="50%" stop-color="#a78bfa" />
          <stop offset="100%" stop-color="#f472b6" />
        </linearGradient>
      </defs>
      <circle class="track-bg" cx="50" cy="50" r="46" 
        stroke-dasharray="216.77" stroke-dashoffset="-27.1" 
        pathLength="288.97" />
      <circle class="track-fill" cx="50" cy="50" r="46" 
        stroke-dasharray="216.77" stroke-dashoffset="216.77" />
    </svg>
  </div>

  <div class="knob-body" id="knobBody">
    <div class="knob-rotation" id="knobRotation">
      <div class="knob-indicator"></div>
    </div>
  </div>
</div>

<div class="value-display">
  <span id="valueNum">0</span><span>%</span>
</div>

<div class="meters">
  <div class="meter reverb">
    <div class="meter-bar-outer">
      <div class="meter-bar-fill" id="meterReverb" style="height: 0%"></div>
    </div>
    <div class="meter-label">Rev</div>
  </div>
  <div class="meter noise">
    <div class="meter-bar-outer">
      <div class="meter-bar-fill" id="meterNoise" style="height: 0%"></div>
    </div>
    <div class="meter-label">Noise</div>
  </div>
  <div class="meter delay">
    <div class="meter-bar-outer">
      <div class="meter-bar-fill" id="meterDelay" style="height: 0%"></div>
    </div>
    <div class="meter-label">Dly</div>
  </div>
  <div class="meter filter">
    <div class="meter-bar-outer">
      <div class="meter-bar-fill" id="meterFilter" style="height: 0%"></div>
    </div>
    <div class="meter-label">HPF</div>
  </div>
</div>

<script type="module" src="js/juce/index.js"></script>
<script type="module">
import { getSliderState } from './js/juce/index.js';

// Elements
const knobArea = document.getElementById('knobArea');
const knobBody = document.getElementById('knobBody');
const knobRotation = document.getElementById('knobRotation');
const trackFill = document.querySelector('.track-fill');
const valueNum = document.getElementById('valueNum');
const meterReverb = document.getElementById('meterReverb');
const meterNoise = document.getElementById('meterNoise');
const meterDelay = document.getElementById('meterDelay');
const meterFilter = document.getElementById('meterFilter');
const root = document.documentElement;

// Arc constants
const arcLength = 216.77;
const minAngle = -135;
const maxAngle = 135;

// JUCE parameter state
const buildupState = getSliderState("BUILDUP");

// Drag state
let isDragging = false;
let lastY = 0;

function updateUI() {
  const t = buildupState.getNormalisedValue();
  const knobValue = t * 100;

  // CSS variable for reactive elements
  root.style.setProperty('--knob-value', knobValue);

  // Knob rotation (270 degree range: -135 to +135)
  const angle = minAngle + t * (maxAngle - minAngle);
  knobRotation.style.transform = `rotate(${angle}deg)`;

  // Arc fill
  const fillOffset = arcLength - (t * arcLength);
  trackFill.style.strokeDashoffset = fillOffset;

  // Value display
  valueNum.textContent = Math.round(knobValue);

  // Parameter mapping (matches DSP curves)
  const reverb = t;
  const noise = Math.max(0, (t - 0.1) / 0.9);
  const delay = Math.max(0, (t - 0.15) / 0.85);
  const filter = Math.max(0, (t - 0.05) / 0.95);

  meterReverb.style.height = (reverb * 100) + '%';
  meterNoise.style.height = (noise * 100) + '%';
  meterDelay.style.height = (delay * 100) + '%';
  meterFilter.style.height = (filter * 100) + '%';
}

// Listen for parameter changes from the DAW
buildupState.valueChangedEvent.addListener(() => {
  updateUI();
});

// Mouse interaction - relative drag
knobBody.addEventListener('mousedown', function(e) {
  isDragging = true;
  lastY = e.clientY;
  document.body.style.cursor = 'grabbing';
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  const deltaY = lastY - e.clientY;
  lastY = e.clientY;
  const sensitivity = 0.005;
  const currentVal = buildupState.getNormalisedValue();
  const newVal = Math.max(0, Math.min(1, currentVal + deltaY * sensitivity));
  buildupState.setNormalisedValue(newVal);
});

document.addEventListener('mouseup', function() {
  if (isDragging) {
    isDragging = false;
    document.body.style.cursor = '';
  }
});

// Mouse wheel
knobArea.addEventListener('wheel', function(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.02 : 0.02;
  const currentVal = buildupState.getNormalisedValue();
  const newVal = Math.max(0, Math.min(1, currentVal + delta));
  buildupState.setNormalisedValue(newVal);
}, { passive: false });

// Double-click to reset
knobBody.addEventListener('dblclick', function() {
  buildupState.setNormalisedValue(0);
});

// Initialize UI
updateUI();
</script>

</body>
</html>

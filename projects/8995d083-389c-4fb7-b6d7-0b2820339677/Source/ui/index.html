<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 600px;
            height: 400px;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #4a9eff;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 24px;
            align-items: center;
            justify-content: center;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .knob-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .knob {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1a1f3a, #0f1228);
            box-shadow: 
                -6px -6px 12px rgba(255, 255, 255, 0.05),
                6px 6px 12px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(74, 158, 255, 0.1);
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            transition: box-shadow 0.2s ease;
        }

        .knob:hover {
            box-shadow: 
                -6px -6px 12px rgba(255, 255, 255, 0.08),
                6px 6px 12px rgba(0, 0, 0, 0.6),
                inset 0 0 0 1px rgba(74, 158, 255, 0.2);
        }

        .knob:active {
            box-shadow: 
                inset -3px -3px 8px rgba(255, 255, 255, 0.03),
                inset 3px 3px 8px rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(74, 158, 255, 0.3);
        }

        .knob-indicator {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 20px;
            background: linear-gradient(180deg, #4a9eff 0%, #2d7acc 100%);
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(74, 158, 255, 0.6);
        }

        .knob-label {
            font-size: 13px;
            font-weight: 500;
            color: #8a9bc0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .knob-value {
            font-size: 11px;
            font-weight: 400;
            color: #4a5f7f;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Zenith</h1>
        </div>
        
        <div class="controls">
            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="decay" data-param="Decay Rate" min="0" max="1" value="0.7" step="0.01">
                    <div class="knob-indicator" id="decay-indicator"></div>
                </div>
                <span class="knob-label">Decay</span>
                <span class="knob-value" id="decay-value">0.70</span>
            </div>
            
            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="damping" data-param="Damping" min="0" max="1" value="0.625" step="0.01">
                    <div class="knob-indicator" id="damping-indicator"></div>
                </div>
                <span class="knob-label">Damping</span>
                <span class="knob-value" id="damping-value">0.63</span>
            </div>
            
            <div class="knob-container">
                <div class="knob-wrapper">
                    <input type="range" class="knob" id="mix" data-param="Dry/Wet Mix" min="0" max="1" value="0.5" step="0.01">
                    <div class="knob-indicator" id="mix-indicator"></div>
                </div>
                <span class="knob-label">Mix</span>
                <span class="knob-value" id="mix-value">0.50</span>
            </div>
        </div>
    </div>

    <script>
        // Knob rotation and value display
        const knobs = [
            { input: document.getElementById('decay'), indicator: document.getElementById('decay-indicator'), value: document.getElementById('decay-value') },
            { input: document.getElementById('damping'), indicator: document.getElementById('damping-indicator'), value: document.getElementById('damping-value') },
            { input: document.getElementById('mix'), indicator: document.getElementById('mix-indicator'), value: document.getElementById('mix-value') }
        ];

        function updateKnob(knob) {
            const value = parseFloat(knob.input.value);
            const rotation = (value - 0) / (1 - 0) * 270 - 135; // -135° to +135°
            knob.indicator.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            knob.indicator.style.transformOrigin = 'center bottom';
            knob.value.textContent = value.toFixed(2);
        }

        knobs.forEach(knob => {
            updateKnob(knob);
            knob.input.addEventListener('input', () => updateKnob(knob));
        });

        // Mouse drag support for knobs
        knobs.forEach(knob => {
            let isDragging = false;
            let startY = 0;
            let startValue = 0;

            knob.input.parentElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.clientY;
                startValue = parseFloat(knob.input.value);
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaY = startY - e.clientY;
                const sensitivity = 0.005;
                let newValue = startValue + (deltaY * sensitivity);
                newValue = Math.max(0, Math.min(1, newValue));
                knob.input.value = newValue;
                updateKnob(knob);
                knob.input.dispatchEvent(new Event('input', { bubbles: true }));
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID DRIP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --bg-dark: #0a0a10;
      --bg-panel: #111119;
      --bg-section: #16161f;
      --accent-primary: #7b5ea7;
      --accent-glow: #a478e0;
      --accent-delay: #4a8fa8;
      --accent-delay-glow: #5ec4e6;
      --text-bright: #e8e4f0;
      --text-dim: #6b6580;
      --text-label: #8a82a0;
      --ring-track: #1e1e2a;
      --knob-size: 72px;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-bright);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Main Container ── */
    .plugin {
      width: 580px;
      background: var(--bg-panel);
      border-radius: 18px;
      border: 1px solid rgba(123, 94, 167, 0.15);
      box-shadow:
        0 0 60px rgba(123, 94, 167, 0.08),
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      position: relative;
    }

    /* ── Background particles ── */
    .plugin::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(123, 94, 167, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(74, 143, 168, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .plugin > * {
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 12px;
      border-bottom: 1px solid rgba(123, 94, 167, 0.08);
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent-glow), var(--accent-delay-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Mix Knob (header) ── */
    .mix-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mix-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Sections ── */
    .sections {
      display: flex;
      gap: 1px;
      padding: 16px;
      gap: 12px;
    }

    .section {
      flex: 1;
      background: var(--bg-section);
      border-radius: 12px;
      padding: 16px 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .section-reverb .section-title {
      color: var(--accent-glow);
    }

    .section-delay .section-title {
      color: var(--accent-delay-glow);
    }

    /* ── Toggle Switch ── */
    .toggle {
      width: 32px;
      height: 16px;
      background: var(--ring-track);
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s ease;
    }

    .toggle.active {
      background: rgba(123, 94, 167, 0.4);
    }

    .toggle.active.delay-toggle {
      background: rgba(74, 143, 168, 0.4);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-dim);
      top: 2px;
      left: 2px;
      transition: all 0.3s ease;
    }

    .toggle.active::after {
      left: 18px;
      background: var(--accent-glow);
      box-shadow: 0 0 8px rgba(164, 120, 224, 0.5);
    }

    .toggle.active.delay-toggle::after {
      background: var(--accent-delay-glow);
      box-shadow: 0 0 8px rgba(94, 196, 230, 0.5);
    }

    /* ── Knob Grid ── */
    .knob-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 8px;
      justify-items: center;
    }

    .knob-grid.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }

    /* ── Knob Component ── */
    .knob-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .knob {
      width: var(--knob-size);
      height: var(--knob-size);
      position: relative;
      cursor: grab;
    }

    .knob:active {
      cursor: grabbing;
    }

    .knob svg {
      width: 100%;
      height: 100%;
    }

    .knob-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .knob-arc {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s ease;
      filter: drop-shadow(0 0 4px var(--accent-glow));
    }

    .knob-arc.reverb-arc {
      stroke: var(--accent-glow);
      filter: drop-shadow(0 0 4px rgba(164, 120, 224, 0.4));
    }

    .knob-arc.delay-arc {
      stroke: var(--accent-delay-glow);
      filter: drop-shadow(0 0 4px rgba(94, 196, 230, 0.4));
    }

    .knob-arc.mix-arc {
      stroke: url(#mixGradient);
      filter: drop-shadow(0 0 4px rgba(164, 120, 224, 0.3));
    }

    .knob-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      background: radial-gradient(circle at 40% 35%, #2a2a3a, #1a1a24);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .knob-indicator {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 6px;
      border-radius: 1px;
    }

    .reverb-indicator {
      background: var(--accent-glow);
      box-shadow: 0 0 4px var(--accent-glow);
    }

    .delay-indicator {
      background: var(--accent-delay-glow);
      box-shadow: 0 0 4px var(--accent-delay-glow);
    }

    .mix-indicator {
      background: var(--accent-glow);
      box-shadow: 0 0 4px var(--accent-glow);
    }

    .knob-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-bright);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .knob-wrap:hover .knob-value,
    .knob-wrap.dragging .knob-value {
      opacity: 1;
    }

    .knob-wrap:hover .knob-center,
    .knob-wrap.dragging .knob-center {
      opacity: 0.3;
    }

    .knob-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-label);
      text-align: center;
    }

    /* ── Small knob variant (mix) ── */
    .knob-wrap.small .knob {
      --knob-size: 48px;
      width: 48px;
      height: 48px;
    }

    .knob-wrap.small .knob-center {
      width: 26px;
      height: 26px;
    }

    .knob-wrap.small .knob-indicator {
      top: 4px;
      height: 5px;
    }

    .knob-wrap.small .knob-value {
      font-size: 9px;
    }

    /* ── Visualizer ── */
    .visualizer {
      padding: 0 16px 16px;
    }

    .viz-container {
      background: var(--bg-section);
      border-radius: 10px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      overflow: hidden;
      position: relative;
    }

    .viz-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Hover glow effects ── */
    .knob-wrap:hover .knob-arc.reverb-arc {
      filter: drop-shadow(0 0 8px rgba(164, 120, 224, 0.6));
    }

    .knob-wrap:hover .knob-arc.delay-arc {
      filter: drop-shadow(0 0 8px rgba(94, 196, 230, 0.6));
    }

    /* ── Disabled state ── */
    .section.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .section.disabled .section-header {
      pointer-events: all;
    }

    .section.disabled .toggle {
      pointer-events: all;
    }
  </style>
</head>
<body>

<div class="plugin">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-title">Void Drip</div>
      <div class="logo-sub">Lo-fi space engine</div>
    </div>
    <div class="mix-section">
      <span class="mix-label">Dry / Wet</span>
      <div class="knob-wrap small" data-param="mix" data-min="0" data-max="100" data-value="50" data-unit="%">
        <div class="knob">
          <svg viewBox="0 0 72 72">
            <defs>
              <linearGradient id="mixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#a478e0"/>
                <stop offset="100%" style="stop-color:#5ec4e6"/>
              </linearGradient>
            </defs>
            <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
            <path class="knob-arc mix-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
          </svg>
          <div class="knob-center">
            <div class="knob-indicator mix-indicator"></div>
          </div>
          <div class="knob-value">50%</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Effect Sections -->
  <div class="sections">
    <!-- Reverb Section -->
    <div class="section section-reverb" id="reverbSection">
      <div class="section-header">
        <span class="section-title">Reverb</span>
        <div class="toggle active" id="reverbToggle"></div>
      </div>
      <div class="knob-grid">
        <!-- Decay -->
        <div class="knob-wrap" data-param="reverb_decay" data-min="0" data-max="100" data-value="65" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc reverb-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator reverb-indicator"></div>
            </div>
            <div class="knob-value">65%</div>
          </div>
          <div class="knob-label">Decay</div>
        </div>
        <!-- Degrade -->
        <div class="knob-wrap" data-param="reverb_degrade" data-min="0" data-max="100" data-value="40" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc reverb-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator reverb-indicator"></div>
            </div>
            <div class="knob-value">40%</div>
          </div>
          <div class="knob-label">Degrade</div>
        </div>
        <!-- Shimmer -->
        <div class="knob-wrap" data-param="reverb_shimmer" data-min="0" data-max="100" data-value="30" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc reverb-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator reverb-indicator"></div>
            </div>
            <div class="knob-value">30%</div>
          </div>
          <div class="knob-label">Shimmer</div>
        </div>
        <!-- Tone -->
        <div class="knob-wrap" data-param="reverb_tone" data-min="0" data-max="100" data-value="45" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc reverb-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator reverb-indicator"></div>
            </div>
            <div class="knob-value">45%</div>
          </div>
          <div class="knob-label">Tone</div>
        </div>
      </div>
    </div>

    <!-- Delay Section -->
    <div class="section section-delay" id="delaySection">
      <div class="section-header">
        <span class="section-title">Delay</span>
        <div class="toggle delay-toggle active" id="delayToggle"></div>
      </div>
      <div class="knob-grid">
        <!-- Time -->
        <div class="knob-wrap" data-param="delay_time" data-min="0" data-max="100" data-value="50" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc delay-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator delay-indicator"></div>
            </div>
            <div class="knob-value">50%</div>
          </div>
          <div class="knob-label">Time</div>
        </div>
        <!-- Feedback -->
        <div class="knob-wrap" data-param="delay_feedback" data-min="0" data-max="100" data-value="55" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc delay-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator delay-indicator"></div>
            </div>
            <div class="knob-value">55%</div>
          </div>
          <div class="knob-label">Feedback</div>
        </div>
        <!-- Warmth -->
        <div class="knob-wrap" data-param="delay_warmth" data-min="0" data-max="100" data-value="60" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc delay-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator delay-indicator"></div>
            </div>
            <div class="knob-value">60%</div>
          </div>
          <div class="knob-label">Warmth</div>
        </div>
        <!-- Wow -->
        <div class="knob-wrap" data-param="delay_wow" data-min="0" data-max="100" data-value="25" data-unit="%">
          <div class="knob">
            <svg viewBox="0 0 72 72">
              <path class="knob-track" d="M 18 56 A 28 28 0 1 1 54 56" />
              <path class="knob-arc delay-arc" d="M 18 56 A 28 28 0 1 1 54 56" />
            </svg>
            <div class="knob-center">
              <div class="knob-indicator delay-indicator"></div>
            </div>
            <div class="knob-value">25%</div>
          </div>
          <div class="knob-label">Wow</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer">
    <div class="viz-container">
      <canvas class="viz-canvas" id="vizCanvas"></canvas>
    </div>
  </div>
</div>

<script>
  // ── Knob Interaction ──
  const ARC_LENGTH = 197; // approximate length of the SVG arc path
  const START_ANGLE = 130;
  const END_ANGLE = 410;
  const ANGLE_RANGE = END_ANGLE - START_ANGLE;

  let activeKnob = null;
  let startY = 0;
  let startValue = 0;

  function updateKnob(wrap, value) {
    const min = parseFloat(wrap.dataset.min);
    const max = parseFloat(wrap.dataset.max);
    const unit = wrap.dataset.unit || '';
    const clamped = Math.max(min, Math.min(max, value));
    wrap.dataset.value = clamped;

    const normalized = (clamped - min) / (max - min);

    // Update arc
    const arc = wrap.querySelector('.knob-arc');
    const dashOffset = ARC_LENGTH * (1 - normalized);
    arc.style.strokeDasharray = ARC_LENGTH;
    arc.style.strokeDashoffset = dashOffset;

    // Update indicator rotation
    const center = wrap.querySelector('.knob-center');
    const angle = START_ANGLE + normalized * ANGLE_RANGE;
    center.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

    // Update value display
    const display = wrap.querySelector('.knob-value');
    display.textContent = Math.round(clamped) + unit;

    // Send to backend
    if (window.sendParameterChange) {
      window.sendParameterChange(wrap.dataset.param, normalized);
    }
  }

  function initKnobs() {
    document.querySelectorAll('.knob-wrap').forEach(wrap => {
      const value = parseFloat(wrap.dataset.value);
      updateKnob(wrap, value);

      const knob = wrap.querySelector('.knob');
      knob.addEventListener('mousedown', (e) => {
        e.preventDefault();
        activeKnob = wrap;
        startY = e.clientY;
        startValue = parseFloat(wrap.dataset.value);
        wrap.classList.add('dragging');
        document.body.style.cursor = 'grabbing';
      });

      // Double-click to reset
      knob.addEventListener('dblclick', (e) => {
        e.preventDefault();
        const defaultVal = parseFloat(wrap.dataset.value);
        updateKnob(wrap, defaultVal);
      });
    });
  }

  document.addEventListener('mousemove', (e) => {
    if (!activeKnob) return;
    const deltaY = startY - e.clientY;
    const sensitivity = 0.5;
    const min = parseFloat(activeKnob.dataset.min);
    const max = parseFloat(activeKnob.dataset.max);
    const range = max - min;
    const newValue = startValue + deltaY * sensitivity;
    updateKnob(activeKnob, newValue);
  });

  document.addEventListener('mouseup', () => {
    if (activeKnob) {
      activeKnob.classList.remove('dragging');
      activeKnob = null;
      document.body.style.cursor = '';
    }
  });

  // ── Toggle Switches ──
  function initToggles() {
    const reverbToggle = document.getElementById('reverbToggle');
    const delayToggle = document.getElementById('delayToggle');
    const reverbSection = document.getElementById('reverbSection');
    const delaySection = document.getElementById('delaySection');

    reverbToggle.addEventListener('click', () => {
      reverbToggle.classList.toggle('active');
      const active = reverbToggle.classList.contains('active');
      if (!active) {
        reverbSection.classList.add('disabled');
      } else {
        reverbSection.classList.remove('disabled');
      }
      if (window.sendParameterChange) {
        window.sendParameterChange('reverb_enabled', active ? 1 : 0);
      }
    });

    delayToggle.addEventListener('click', () => {
      delayToggle.classList.toggle('active');
      const active = delayToggle.classList.contains('active');
      if (!active) {
        delaySection.classList.add('disabled');
      } else {
        delaySection.classList.remove('disabled');
      }
      if (window.sendParameterChange) {
        window.sendParameterChange('delay_enabled', active ? 1 : 0);
      }
    });
  }

  // ── Visualizer ──
  function initVisualizer() {
    const canvas = document.getElementById('vizCanvas');
    const ctx = canvas.getContext('2d');
    let frame = 0;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      ctx.scale(2, 2);
    }

    resize();
    window.addEventListener('resize', resize);

    function draw() {
      const w = canvas.width / 2;
      const h = canvas.height / 2;
      ctx.clearRect(0, 0, w, h);

      const midY = h / 2;
      const points = 80;

      // Reverb wave (purple)
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(164, 120, 224, 0.3)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i <= points; i++) {
        const x = (i / points) * w;
        const reverbDecay = parseFloat(document.querySelector('[data-param="reverb_decay"]')?.dataset.value || 50) / 100;
        const y = midY + Math.sin(frame * 0.02 + i * 0.08) * (6 + reverbDecay * 10) *
                  Math.sin(i * 0.04 + frame * 0.01);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Delay wave (blue)
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(94, 196, 230, 0.3)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i <= points; i++) {
        const x = (i / points) * w;
        const delayFb = parseFloat(document.querySelector('[data-param="delay_feedback"]')?.dataset.value || 50) / 100;
        const y = midY + Math.sin(frame * 0.015 + i * 0.12 + 1.5) * (4 + delayFb * 8) *
                  Math.cos(i * 0.03 + frame * 0.008);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Center glow line
      ctx.beginPath();
      const gradient = ctx.createLinearGradient(0, midY, w, midY);
      gradient.addColorStop(0, 'rgba(164, 120, 224, 0.05)');
      gradient.addColorStop(0.5, 'rgba(164, 120, 224, 0.12)');
      gradient.addColorStop(1, 'rgba(94, 196, 230, 0.05)');
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 0.5;
      ctx.moveTo(0, midY);
      ctx.lineTo(w, midY);
      ctx.stroke();

      frame++;
      requestAnimationFrame(draw);
    }

    draw();
  }

  // ── Init ──
  initKnobs();
  initToggles();
  initVisualizer();
</script>

</body>
</html>

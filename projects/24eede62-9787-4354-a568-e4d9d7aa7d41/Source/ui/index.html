<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    html, body {
      width: 500px;
      height: 380px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      background: #0d0d11;
      font-family: 'Inter', sans-serif;
      color: #c8c8d0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    .plugin-root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 32px;
      background: radial-gradient(ellipse at 50% 20%, #161622 0%, #0d0d11 70%);
      position: relative;
    }

    /* Subtle atmospheric glow */
    .plugin-root::before {
      content: '';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 180px;
      background: radial-gradient(ellipse, rgba(90, 120, 200, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }

    .plugin-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #e0e0ec;
      text-shadow: 0 0 20px rgba(120, 140, 220, 0.15);
    }

    .plugin-subtitle {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5a5a70;
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120, 140, 220, 0.2), transparent);
      margin: 12px 0 28px 0;
    }

    /* Knobs row */
    .knobs-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* Knob container */
    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .knob-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #5a5a70;
    }

    .knob-container {
      width: 80px;
      height: 80px;
      position: relative;
      cursor: pointer;
    }

    .knob-svg {
      width: 100%;
      height: 100%;
    }

    /* Track (background arc) */
    .knob-track {
      fill: none;
      stroke: #1e1e2a;
      stroke-width: 3;
      stroke-linecap: round;
    }

    /* Active arc */
    .knob-arc {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s ease;
    }

    .knob-arc.decay {
      stroke: url(#gradient-decay);
    }

    .knob-arc.mix {
      stroke: url(#gradient-mix);
    }

    .knob-arc.size {
      stroke: url(#gradient-size);
    }

    /* Knob dot indicator */
    .knob-dot {
      fill: #e0e0ec;
      filter: drop-shadow(0 0 4px rgba(180, 190, 240, 0.4));
      transition: cx 0.05s ease, cy 0.05s ease;
    }

    /* Value display */
    .knob-value {
      font-size: 15px;
      font-weight: 400;
      color: #d0d0dc;
      letter-spacing: 0.5px;
      min-width: 40px;
      text-align: center;
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .footer-label {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3a4a;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #2a2a3a;
    }

    /* Hover glow on knobs */
    .knob-container:hover .knob-dot {
      filter: drop-shadow(0 0 8px rgba(180, 190, 240, 0.6));
    }
  </style>
</head>
<body>
  <div class="plugin-root">

    <!-- Header -->
    <div class="header">
      <div class="plugin-name">Vault</div>
      <div class="plugin-subtitle">Plate Reverb</div>
    </div>

    <div class="divider"></div>

    <!-- SVG Gradient Definitions -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <linearGradient id="gradient-decay" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6878c0" />
          <stop offset="100%" stop-color="#8b9ce0" />
        </linearGradient>
        <linearGradient id="gradient-mix" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6878c0" />
          <stop offset="100%" stop-color="#8b9ce0" />
        </linearGradient>
        <linearGradient id="gradient-size" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6878c0" />
          <stop offset="100%" stop-color="#8b9ce0" />
        </linearGradient>
      </defs>
    </svg>

    <!-- Knobs -->
    <div class="knobs-row">

      <!-- Decay Knob -->
      <div class="knob-group">
        <div class="knob-label">Decay</div>
        <div class="knob-container" data-param="decay" data-min="0.5" data-max="20" data-value="6" data-unit="s" data-decimals="1">
          <svg class="knob-svg" viewBox="0 0 80 80">
            <path class="knob-track" d="M 16 64 A 32 32 0 1 1 64 64" />
            <path class="knob-arc decay" d="M 16 64 A 32 32 0 1 1 64 64" />
            <circle class="knob-dot" r="4" cx="16" cy="64" />
          </svg>
        </div>
        <div class="knob-value">6.0s</div>
      </div>

      <!-- Mix Knob -->
      <div class="knob-group">
        <div class="knob-label">Mix</div>
        <div class="knob-container" data-param="mix" data-min="0" data-max="100" data-value="35" data-unit="%" data-decimals="0">
          <svg class="knob-svg" viewBox="0 0 80 80">
            <path class="knob-track" d="M 16 64 A 32 32 0 1 1 64 64" />
            <path class="knob-arc mix" d="M 16 64 A 32 32 0 1 1 64 64" />
            <circle class="knob-dot" r="4" cx="16" cy="64" />
          </svg>
        </div>
        <div class="knob-value">35%</div>
      </div>

      <!-- Size Knob -->
      <div class="knob-group">
        <div class="knob-label">Size</div>
        <div class="knob-container" data-param="size" data-min="0" data-max="100" data-value="70" data-unit="%" data-decimals="0">
          <svg class="knob-svg" viewBox="0 0 80 80">
            <path class="knob-track" d="M 16 64 A 32 32 0 1 1 64 64" />
            <path class="knob-arc size" d="M 16 64 A 32 32 0 1 1 64 64" />
            <circle class="knob-dot" r="4" cx="16" cy="64" />
          </svg>
        </div>
        <div class="knob-value">70%</div>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-label">Bright</span>
      <div class="footer-dot"></div>
      <span class="footer-label">Plate</span>
      <div class="footer-dot"></div>
      <span class="footer-label">Stereo</span>
    </div>

  </div>

  <script>
    // Arc geometry
    const ARC_START_ANGLE = (3 * Math.PI) / 4;   // 225 deg (bottom-left)
    const ARC_END_ANGLE   = Math.PI / 4;          // -45 deg mapped to full sweep
    const ARC_SWEEP       = (3 * Math.PI) / 2;    // 270 deg total
    const CX = 40, CY = 40, R = 32;

    // Compute arc path length
    const ARC_LENGTH = ARC_SWEEP * R;

    function angleToXY(fraction) {
      const angle = ARC_START_ANGLE + fraction * ARC_SWEEP;
      return {
        x: CX + R * Math.cos(angle),
        y: CY + R * Math.sin(angle)
      };
    }

    function initKnob(container) {
      const min = parseFloat(container.dataset.min);
      const max = parseFloat(container.dataset.max);
      const decimals = parseInt(container.dataset.decimals);
      const unit = container.dataset.unit;
      let value = parseFloat(container.dataset.value);

      const arc = container.querySelector('.knob-arc');
      const dot = container.querySelector('.knob-dot');
      const valueDisplay = container.closest('.knob-group').querySelector('.knob-value');

      // Set up arc dash
      arc.style.strokeDasharray = ARC_LENGTH;

      function update(val) {
        value = Math.max(min, Math.min(max, val));
        container.dataset.value = value;
        const fraction = (value - min) / (max - min);

        // Arc fill
        const offset = ARC_LENGTH * (1 - fraction);
        arc.style.strokeDashoffset = offset;

        // Dot position
        const pos = angleToXY(fraction);
        dot.setAttribute('cx', pos.x);
        dot.setAttribute('cy', pos.y);

        // Value text
        valueDisplay.textContent = value.toFixed(decimals) + unit;
      }

      // Mouse drag
      let dragging = false;
      let startY, startValue;

      container.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startValue = value;
        e.preventDefault();
        document.body.style.cursor = 'ns-resize';
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const range = max - min;
        const sensitivity = range / 150;
        update(startValue + delta * sensitivity);
      });

      window.addEventListener('mouseup', () => {
        if (dragging) {
          dragging = false;
          document.body.style.cursor = '';
        }
      });

      // Double-click to reset
      container.addEventListener('dblclick', () => {
        update(parseFloat(container.dataset.value));
      });

      // Initialize
      update(value);
    }

    // Init all knobs
    document.querySelectorAll('.knob-container').forEach(initKnob);
  </script>
</body>
</html>

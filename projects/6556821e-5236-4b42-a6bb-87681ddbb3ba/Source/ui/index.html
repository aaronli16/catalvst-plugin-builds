<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Reverb</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #222222;
      --bg-knob: #2a2a2a;
      --border-subtle: #333333;
      --text-primary: #c8c8c8;
      --text-dim: #666666;
      --text-value: #999999;
      --accent-shimmer: #7b8fcc;
      --accent-glow: #5a6faa;
      --accent-bright: #9aadee;
      --ring-track: #2e2e2e;
      --ring-active: #5c6ea0;
    }

    body {
      background: var(--bg-primary);
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .plugin-container {
      width: 520px;
      height: 380px;
      background: var(--bg-primary);
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Subtle top-edge highlight */
    .plugin-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(123, 143, 204, 0.2), transparent);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 28px 10px;
    }

    .plugin-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .plugin-subtitle {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Shimmer canvas area */
    .shimmer-display {
      position: relative;
      height: 100px;
      margin: 8px 28px 12px;
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }

    .shimmer-display canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Knobs area */
    .controls {
      display: flex;
      justify-content: space-evenly;
      align-items: flex-start;
      padding: 10px 16px 24px;
      flex: 1;
    }

    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100px;
    }

    .knob-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .knob-wrapper {
      position: relative;
      width: 72px;
      height: 72px;
      cursor: grab;
    }

    .knob-wrapper:active {
      cursor: grabbing;
    }

    .knob-wrapper svg {
      width: 100%;
      height: 100%;
    }

    .knob-value {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-value);
      letter-spacing: 0.5px;
      min-height: 14px;
      text-align: center;
    }

    /* SVG knob styling */
    .knob-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .knob-arc {
      fill: none;
      stroke: var(--ring-active);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke 0.15s ease;
      filter: drop-shadow(0 0 3px rgba(123, 143, 204, 0.15));
    }

    .knob-body {
      fill: var(--bg-knob);
      stroke: var(--border-subtle);
      stroke-width: 1;
    }

    .knob-indicator {
      stroke: var(--accent-shimmer);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(123, 143, 204, 0.3));
    }

    /* Shimmer knob special glow */
    .knob-group[data-param="shimmer"] .knob-arc {
      stroke: var(--accent-bright);
      filter: drop-shadow(0 0 6px rgba(154, 173, 238, 0.25));
    }

    .knob-group[data-param="shimmer"] .knob-indicator {
      stroke: var(--accent-bright);
      filter: drop-shadow(0 0 6px rgba(154, 173, 238, 0.4));
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: center;
      padding: 0 28px 16px;
    }

    .footer-text {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="plugin-container">
    <div class="header">
      <span class="plugin-title">Shimmer</span>
      <span class="plugin-subtitle">Reverb</span>
    </div>

    <div class="shimmer-display">
      <canvas id="shimmerCanvas"></canvas>
    </div>

    <div class="controls">
      <div class="knob-group" data-param="mix" data-min="0" data-max="100" data-value="35" data-unit="%">
        <span class="knob-label">Mix</span>
        <div class="knob-wrapper" id="knob-mix">
          <svg viewBox="0 0 72 72"></svg>
        </div>
        <span class="knob-value">35%</span>
      </div>
      <div class="knob-group" data-param="size" data-min="0" data-max="100" data-value="60" data-unit="%">
        <span class="knob-label">Size</span>
        <div class="knob-wrapper" id="knob-size">
          <svg viewBox="0 0 72 72"></svg>
        </div>
        <span class="knob-value">60%</span>
      </div>
      <div class="knob-group" data-param="shimmer" data-min="0" data-max="100" data-value="40" data-unit="%">
        <span class="knob-label">Shimmer</span>
        <div class="knob-wrapper" id="knob-shimmer">
          <svg viewBox="0 0 72 72"></svg>
        </div>
        <span class="knob-value">40%</span>
      </div>
      <div class="knob-group" data-param="decay" data-min="0.1" data-max="20" data-value="4.0" data-unit="s">
        <span class="knob-label">Decay</span>
        <div class="knob-wrapper" id="knob-decay">
          <svg viewBox="0 0 72 72"></svg>
        </div>
        <span class="knob-value">4.0s</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">Shimmer Reverb</span>
    </div>
  </div>

  <script>
    // ── Knob Configuration ──
    const ARC_START = 135;
    const ARC_END = 405;
    const ARC_RANGE = ARC_END - ARC_START;
    const CENTER = 36;
    const RADIUS = 30;
    const INNER_RADIUS = 22;
    const INDICATOR_INNER = 16;
    const INDICATOR_OUTER = 22;

    function degToRad(deg) {
      return (deg * Math.PI) / 180;
    }

    function polarToCart(cx, cy, r, angleDeg) {
      const rad = degToRad(angleDeg - 90);
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCart(cx, cy, r, endAngle);
      const end = polarToCart(cx, cy, r, startAngle);
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}`;
    }

    // ── Knob State ──
    const knobs = {};

    function initKnob(group) {
      const param = group.dataset.param;
      const min = parseFloat(group.dataset.min);
      const max = parseFloat(group.dataset.max);
      const value = parseFloat(group.dataset.value);
      const unit = group.dataset.unit;
      const svg = group.querySelector('svg');
      const valueDisplay = group.querySelector('.knob-value');

      const normalized = (value - min) / (max - min);

      knobs[param] = { min, max, value, unit, normalized, svg, valueDisplay, group };

      renderKnob(param);
    }

    function renderKnob(param) {
      const k = knobs[param];
      const svg = k.svg;
      const angle = ARC_START + k.normalized * ARC_RANGE;

      // Track arc
      const trackPath = describeArc(CENTER, CENTER, RADIUS, ARC_START, ARC_END);
      // Active arc
      const arcEnd = ARC_START + Math.max(k.normalized * ARC_RANGE, 0.5);
      const activePath = describeArc(CENTER, CENTER, RADIUS, ARC_START, arcEnd);
      // Indicator line
      const indInner = polarToCart(CENTER, CENTER, INDICATOR_INNER, angle);
      const indOuter = polarToCart(CENTER, CENTER, INDICATOR_OUTER, angle);

      svg.innerHTML = `
        <path class="knob-track" d="${trackPath}" />
        <path class="knob-arc" d="${activePath}" />
        <circle class="knob-body" cx="${CENTER}" cy="${CENTER}" r="${INNER_RADIUS}" />
        <line class="knob-indicator" x1="${indInner.x}" y1="${indInner.y}" x2="${indOuter.x}" y2="${indOuter.y}" />
      `;

      // Update value display
      const rawVal = k.min + k.normalized * (k.max - k.min);
      let displayVal;
      if (k.unit === 's') {
        displayVal = rawVal.toFixed(1) + k.unit;
      } else {
        displayVal = Math.round(rawVal) + k.unit;
      }
      k.valueDisplay.textContent = displayVal;
      k.value = rawVal;
    }

    // ── Knob Interaction ──
    let activeKnob = null;
    let startY = 0;
    let startNorm = 0;

    function onPointerDown(e) {
      const wrapper = e.target.closest('.knob-wrapper');
      if (!wrapper) return;
      const group = wrapper.closest('.knob-group');
      const param = group.dataset.param;

      activeKnob = param;
      startY = e.clientY;
      startNorm = knobs[param].normalized;

      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);
      e.preventDefault();
    }

    function onPointerMove(e) {
      if (!activeKnob) return;
      const delta = (startY - e.clientY) / 200;
      let newNorm = Math.max(0, Math.min(1, startNorm + delta));
      knobs[activeKnob].normalized = newNorm;
      renderKnob(activeKnob);
      sendParam(activeKnob);
    }

    function onPointerUp() {
      activeKnob = null;
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', onPointerUp);
    }

    // Double-click to reset
    function onDblClick(e) {
      const wrapper = e.target.closest('.knob-wrapper');
      if (!wrapper) return;
      const group = wrapper.closest('.knob-group');
      const param = group.dataset.param;
      const defaultVal = parseFloat(group.dataset.value);
      const k = knobs[param];
      k.normalized = (defaultVal - k.min) / (k.max - k.min);
      renderKnob(param);
      sendParam(param);
    }

    document.addEventListener('pointerdown', onPointerDown);
    document.addEventListener('dblclick', onDblClick);

    // ── DAW Communication ──
    function sendParam(param) {
      const k = knobs[param];
      try {
        if (window.JUCEAPI) {
          window.JUCEAPI.setParameterValue(param, k.normalized);
        }
      } catch (err) { /* silently ignore */ }
    }

    // ── Initialize All Knobs ──
    document.querySelectorAll('.knob-group').forEach(initKnob);

    // ── Shimmer Particle Visualization ──
    const canvas = document.getElementById('shimmerCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame;

    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor(w, h) {
        this.reset(w, h);
        this.y = Math.random() * h;
      }

      reset(w, h) {
        this.x = Math.random() * w;
        this.y = h + 2;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = -(Math.random() * 0.4 + 0.1);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.fadeSpeed = Math.random() * 0.002 + 0.001;
        this.wobbleAmp = Math.random() * 0.5;
        this.wobbleFreq = Math.random() * 0.02 + 0.005;
        this.age = 0;
      }

      update(w, h, shimmerAmount, sizeAmount) {
        this.age++;
        this.x += this.speedX + Math.sin(this.age * this.wobbleFreq) * this.wobbleAmp * shimmerAmount;
        this.y += this.speedY * (0.5 + sizeAmount * 0.8);
        this.opacity -= this.fadeSpeed * (1.2 - shimmerAmount * 0.5);

        if (this.opacity <= 0 || this.y < -5 || this.x < -5 || this.x > w + 5) {
          this.reset(w, h);
          this.opacity = Math.random() * 0.3 + 0.1;
        }
      }

      draw(ctx, shimmerAmount) {
        const glow = shimmerAmount * 0.6;
        const r = 123 + shimmerAmount * 31;
        const g = 143 + shimmerAmount * 30;
        const b = 204 + shimmerAmount * 34;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (1 + glow * 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}, ${this.opacity})`;
        ctx.fill();

        if (shimmerAmount > 0.3) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * (2 + glow), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}, ${this.opacity * 0.15 * shimmerAmount})`;
          ctx.fill();
        }
      }
    }

    function initParticles() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle(w, h));
      }
    }

    function animate() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      const shimmerNorm = knobs.shimmer ? knobs.shimmer.normalized : 0.4;
      const sizeNorm = knobs.size ? knobs.size.normalized : 0.6;
      const decayNorm = knobs.decay ? knobs.decay.normalized : 0.5;

      // Dynamic particle count based on shimmer
      const targetCount = Math.floor(30 + shimmerNorm * 100);
      while (particles.length < targetCount) {
        particles.push(new Particle(w, h));
      }
      while (particles.length > targetCount) {
        particles.pop();
      }

      // Background glow
      if (shimmerNorm > 0.2) {
        const gradient = ctx.createRadialGradient(w / 2, h * 0.7, 0, w / 2, h * 0.7, w * 0.5);
        gradient.addColorStop(0, `rgba(123, 143, 204, ${shimmerNorm * 0.06})`);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
      }

      particles.forEach(p => {
        p.update(w, h, shimmerNorm, sizeNorm);
        p.draw(ctx, shimmerNorm);
      });

      animFrame = requestAnimationFrame(animate);
    }

    initParticles();
    animate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .title {
            color: #666;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .time-selector {
            display: flex;
            gap: 0;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
        }

        .time-button {
            padding: 20px 50px;
            background: #000;
            color: #444;
            border: none;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .time-button:hover {
            color: #666;
        }

        .time-button.active {
            color: #fff;
            background: #111;
        }

        .time-button:first-child::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: #1a1a1a;
        }

        .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #222;
            transition: background 0.2s ease;
        }

        .indicator.active {
            background: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Time</div>
        <div class="time-selector">
            <button class="time-button active" data-time="half">1/2</button>
            <button class="time-button" data-time="quarter">1/4</button>
        </div>
        <div class="indicator active"></div>
    </div>

    <script>
        // State
        let selectedTime = 'half'; // 'half' or 'quarter'

        // Elements
        const buttons = document.querySelectorAll('.time-button');
        const indicator = document.querySelector('.indicator');

        // Initialize plugin communication
        window.pluginInterface = {
            setParameter: (id, value) => {
                if (window.nativePlugin) {
                    window.nativePlugin.setParameter(id, value);
                }
            },
            getParameter: (id) => {
                if (window.nativePlugin) {
                    return window.nativePlugin.getParameter(id);
                }
                return 0;
            }
        };

        // Handle time selection
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const time = button.dataset.time;
                
                // Update UI
                buttons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                selectedTime = time;

                // Send to plugin (0 = 1/2 note, 1 = 1/4 note)
                const value = time === 'half' ? 0 : 1;
                window.pluginInterface.setParameter('time', value);
            });
        });

        // Listen for parameter changes from plugin
        window.updateParameter = (id, value) => {
            if (id === 'time') {
                const time = value === 0 ? 'half' : 'quarter';
                selectedTime = time;
                
                buttons.forEach(btn => {
                    if (btn.dataset.time === time) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
        };

        // Initial sync
        if (window.nativePlugin) {
            const initialValue = window.pluginInterface.getParameter('time');
            window.updateParameter('time', initialValue);
        }
    </script>
</body>
</html>
